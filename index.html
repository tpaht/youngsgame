<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      touch-action: none;
      overflow: hidden;
    }

    h1 {
      font-size: clamp(1.2rem, 5vw, 2rem);
      margin-bottom: 8px;
      letter-spacing: 4px;
      color: #0f3460;
      text-shadow: 0 0 10px #e94560;
    }

    #scoreboard {
      display: flex;
      gap: 30px;
      margin-bottom: 8px;
      font-size: clamp(0.8rem, 3vw, 1rem);
    }

    #scoreboard span { color: #e94560; font-weight: bold; font-size: clamp(1rem, 3.5vw, 1.2rem); }

    canvas {
      border: 2px solid #e94560;
      box-shadow: 0 0 20px #e94560aa;
      border-radius: 4px;
      display: block;
    }

    #message {
      margin-top: 10px;
      font-size: clamp(0.75rem, 3vw, 1rem);
      color: #aaa;
      height: 20px;
      text-align: center;
    }

    #message b { color: #e94560; }

    /* D-pad */
    #dpad {
      display: grid;
      grid-template-areas:
        ". up ."
        "left . right"
        ". down .";
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 4px;
      margin-top: 16px;
    }

    #dpad button {
      background: #0f3460;
      border: 2px solid #e94560;
      border-radius: 10px;
      color: #eee;
      font-size: 1.4rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #dpad button:active { background: #e94560; }

    #btn-up    { grid-area: up; }
    #btn-left  { grid-area: left; }
    #btn-right { grid-area: right; }
    #btn-down  { grid-area: down; }

    #restart-btn {
      display: none;
      margin-top: 12px;
      padding: 10px 32px;
      background: #e94560;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="scoreboard">
    Score: <span id="score">0</span>
    &nbsp;&nbsp;Best: <span id="best">0</span>
  </div>
  <canvas id="c"></canvas>
  <div id="message">Tap a direction or press <b>Space</b> to start</div>

  <div id="dpad">
    <button id="btn-up">▲</button>
    <button id="btn-left">◀</button>
    <button id="btn-right">▶</button>
    <button id="btn-down">▼</button>
  </div>

  <button id="restart-btn">RESTART</button>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const GRID   = 20;

    // Responsive canvas size
    function getSize() {
      const maxW = Math.min(window.innerWidth - 16, 400);
      const maxH = Math.min(window.innerHeight - 260, 400);
      const size = Math.floor(Math.min(maxW, maxH) / GRID) * GRID;
      return size;
    }

    let SIZE, COLS, ROWS;
    function resizeCanvas() {
      SIZE = getSize();
      canvas.width  = SIZE;
      canvas.height = SIZE;
      COLS = SIZE / GRID;
      ROWS = SIZE / GRID;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let snake, dir, nextDir, food, score, best = 0, running = false, started = false, animId;

    function init() {
      snake   = [{ x: Math.floor(COLS/2), y: Math.floor(ROWS/2) },
                 { x: Math.floor(COLS/2)-1, y: Math.floor(ROWS/2) },
                 { x: Math.floor(COLS/2)-2, y: Math.floor(ROWS/2) }];
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      running = true;
      started = true;
      placeFood();
      updateScore();
      document.getElementById('message').textContent = '';
      document.getElementById('restart-btn').style.display = 'none';
      if (animId) cancelAnimationFrame(animId);
      loop();
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    let lastTime = 0;
    const SPEED = 130;

    function loop(ts = 0) {
      animId = requestAnimationFrame(loop);
      if (ts - lastTime < SPEED) return;
      lastTime = ts;
      if (running) update();
      draw();
    }

    function update() {
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        if (score > best) best = score;
        updateScore();
        placeFood();
      } else {
        snake.pop();
      }
    }

    function gameOver() {
      running = false;
      document.getElementById('message').innerHTML = 'Game Over!';
      document.getElementById('restart-btn').style.display = 'inline-block';
    }

    function updateScore() {
      document.getElementById('score').textContent = score;
      document.getElementById('best').textContent  = best;
    }

    function setDir(d) {
      if (!started || !running) { init(); return; }
      if (!(d.x === -dir.x && d.y === -dir.y)) nextDir = d;
    }

    function draw() {
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, SIZE, SIZE);

      // Grid dots
      ctx.fillStyle = '#ffffff08';
      for (let x = 0; x < COLS; x++)
        for (let y = 0; y < ROWS; y++)
          ctx.fillRect(x * GRID + GRID/2 - 1, y * GRID + GRID/2 - 1, 2, 2);

      if (!started) return;

      // Food
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 200);
      ctx.shadowBlur = 10 + pulse * 10;
      ctx.shadowColor = '#ff6b6b';
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(food.x * GRID + GRID/2, food.y * GRID + GRID/2, GRID/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Snake
      snake.forEach((seg, i) => {
        const ratio = 1 - i / snake.length;
        ctx.fillStyle = i === 0 ? '#4ade80' : `hsl(145, 60%, ${25 + ratio * 30}%)`;
        ctx.shadowBlur = i === 0 ? 8 : 0;
        ctx.shadowColor = '#4ade80';
        const pad = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(seg.x * GRID + pad, seg.y * GRID + pad, GRID - pad*2, GRID - pad*2, 3);
        ctx.fill();
      });
      ctx.shadowBlur = 0;

      // Eyes
      const head = snake[0];
      ctx.fillStyle = '#000';
      getEyeOffsets().forEach(([ex, ey]) => {
        ctx.beginPath();
        ctx.arc(head.x * GRID + ex, head.y * GRID + ey, 2, 0, Math.PI * 2);
        ctx.fill();
      });

      // Game over overlay
      if (!running) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, SIZE, SIZE);
        ctx.fillStyle = '#e94560';
        ctx.font = `bold ${Math.floor(SIZE * 0.09)}px Segoe UI`;
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', SIZE/2, SIZE/2 - 10);
        ctx.fillStyle = '#eee';
        ctx.font = `${Math.floor(SIZE * 0.05)}px Segoe UI`;
        ctx.fillText(`Score: ${score}`, SIZE/2, SIZE/2 + 28);
        ctx.textAlign = 'left';
      }
    }

    function getEyeOffsets() {
      const c = GRID / 2;
      if (dir.x === 1)  return [[c+4, c-4], [c+4, c+4]];
      if (dir.x === -1) return [[c-4, c-4], [c-4, c+4]];
      if (dir.y === -1) return [[c-4, c-4], [c+4, c-4]];
      return                   [[c-4, c+4], [c+4, c+4]];
    }

    // Keyboard
    document.addEventListener('keydown', e => {
      const keys = {
        ArrowUp: {x:0,y:-1}, w: {x:0,y:-1},
        ArrowDown: {x:0,y:1}, s: {x:0,y:1},
        ArrowLeft: {x:-1,y:0}, a: {x:-1,y:0},
        ArrowRight: {x:1,y:0}, d: {x:1,y:0},
      };
      const d = keys[e.key];
      if (d) setDir(d);
      if ((e.key === 'Enter' || e.key === ' ') && !running) init();
      if ([' ','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
    });

    // D-pad buttons
    const dpadMap = {
      'btn-up':    {x:0,y:-1},
      'btn-down':  {x:0,y:1},
      'btn-left':  {x:-1,y:0},
      'btn-right': {x:1,y:0},
    };
    Object.entries(dpadMap).forEach(([id, d]) => {
      const btn = document.getElementById(id);
      btn.addEventListener('touchstart', e => { e.preventDefault(); setDir(d); }, { passive: false });
      btn.addEventListener('mousedown',  e => { e.preventDefault(); setDir(d); });
    });

    // Swipe support
    let touchStartX, touchStartY;
    canvas.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) { if (!running) init(); return; }
      if (Math.abs(dx) > Math.abs(dy))
        setDir(dx > 0 ? {x:1,y:0} : {x:-1,y:0});
      else
        setDir(dy > 0 ? {x:0,y:1} : {x:0,y:-1});
      e.preventDefault();
    }, { passive: false });

    document.getElementById('restart-btn').addEventListener('click', init);
    document.getElementById('restart-btn').addEventListener('touchstart', e => { e.preventDefault(); init(); }, { passive: false });

    // Initial draw
    draw();
    loop();
  </script>
</body>
</html>
