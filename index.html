<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Bodily TD</title>
  <meta property="og:title" content="Bodily TD"/>
  <meta property="og:description" content="A mobile tower defense game. Place towers, survive waves!"/>
  <meta property="og:type" content="website"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background:#111;
      display:flex;
      flex-direction:column;
      align-items:center;
      font-family:'Segoe UI',sans-serif;
      color:#eee;
      min-height:100vh;
      overflow-x:hidden;
    }

    #wrapper {
      width:100%;
      max-width:440px;
      display:flex;
      flex-direction:column;
      position:relative;
    }

    /* ── Tower popup ── */
    #tower-popup {
      display:none;
      position:absolute;
      background:#1a1a2e;
      border:2px solid #4a4a7e;
      border-radius:10px;
      padding:8px 10px;
      z-index:20;
      pointer-events:auto;
      box-shadow:0 4px 16px rgba(0,0,0,0.7);
      min-width:160px;
    }
    #tower-popup::after {
      content:'';
      position:absolute;
      bottom:-10px; left:50%;
      transform:translateX(-50%);
      border:5px solid transparent;
      border-top-color:#4a4a7e;
    }
    #popup-title { font-size:0.72rem; color:#aaa; margin-bottom:6px; line-height:1.4; max-width:230px; }
    #popup-btns  { display:flex; gap:4px; flex-wrap:wrap; }
    #popup-detail { display:none; background:#0f172a; border:1px solid #374151; border-radius:6px; padding:6px 8px; margin:4px 0 2px 0; font-size:0.60rem; color:#d1d5db; line-height:1.55; max-width:230px; }
    .detail-btn { background:#374151!important; color:#9ca3af!important; padding:1px 5px!important; font-size:0.60rem!important; border-radius:3px!important; cursor:pointer; border:1px solid #4b5563!important; margin-left:4px; line-height:1.3; vertical-align:middle; }
    #popup-btns button {
      padding:7px 10px; border-radius:6px; border:none;
      cursor:pointer; font-size:0.7rem; font-weight:bold;
      -webkit-tap-highlight-color:transparent;
    }
    #popup-btns button:disabled { background:#555 !important; cursor:not-allowed; opacity:0.6; }
    #pb-smelly    { background:#16a34a; color:#fff; }
    #pb-bloody    { background:#b91c1c; color:#fff; }
    #pb-lightning { background:#ca8a04; color:#fff; }
    #pb-longkick  { background:#0369a1; color:#fff; }
    #pb-phlegm    { background:#a16207; color:#fff; }
    #pb-herpes    { background:#7e22ce; color:#fff; }
    #pb-upgrade   { background:#2563eb; color:#fff; }
    #pb-sell      { background:#dc2626; color:#fff; }

    /* ── Build popup ── */
    #build-popup {
      display:none;
      position:absolute;
      background:#1a1a2e;
      border:2px solid #2d6a2d;
      border-radius:10px;
      padding:7px 8px;
      z-index:20;
      pointer-events:auto;
      box-shadow:0 4px 16px rgba(0,0,0,0.75);
    }
    #build-popup::after {
      content:'';
      position:absolute;
      bottom:-10px; left:50%;
      transform:translateX(-50%);
      border:5px solid transparent;
      border-top-color:#2d6a2d;
    }
    #build-popup-title { font-size:0.65rem; color:#7aab7a; margin-bottom:5px; text-align:center; }
    #build-popup-btns  { display:flex; gap:5px; }
    .bpbtn {
      display:flex; flex-direction:column; align-items:center;
      padding:6px 8px; border-radius:7px; border:none;
      background:#223322; color:#eee; cursor:pointer;
      font-size:0.65rem; text-align:center; min-width:52px;
      -webkit-tap-highlight-color:transparent;
    }
    .bpbtn .bico { font-size:1.4rem; line-height:1.2; }
    .bpbtn .bname { color:#d1d5db; font-size:0.6rem; line-height:1.1; }
    .bpbtn .bcst { color:#fbbf24; font-size:0.65rem; }
    .bpbtn:disabled { opacity:0.38; cursor:not-allowed; }
    .bpbtn:not(:disabled):active { background:#2d4a2d; }

    /* ── Stats bar ── */
    #stats-bar {
      background:#1a1a2e;
      padding:7px 12px;
      display:flex;
      justify-content:space-around;
      border-bottom:2px solid #2d2d4e;
      flex-shrink:0;
    }
    .stat { display:flex; flex-direction:column; align-items:center; }
    .stat .val { font-size:1.15rem; font-weight:bold; }
    .stat .lbl { font-size:0.62rem; color:#aaa; }

    /* ── Canvas ── */
    canvas {
      display:block;
      width:100%;
      touch-action:none;
    }

    /* ── Wave bar ── */
    #tower-bar {
      background:#1a1a2e;
      padding:7px 10px;
      display:flex;
      align-items:center;
      gap:10px;
      border-top:2px solid #2d2d4e;
      flex-shrink:0;
    }

    #wave-btn {
      padding:9px 18px;
      background:#16a34a;
      border:none; border-radius:8px;
      color:#fff; font-size:0.9rem; font-weight:bold;
      cursor:pointer; white-space:nowrap; flex-shrink:0;
      -webkit-tap-highlight-color:transparent;
    }
    #wave-btn:disabled { background:#444; cursor:not-allowed; }

    #wave-info {
      flex:1;
      font-size:0.68rem;
      color:#bbb;
      line-height:1.4;
    }
    #wave-info .wi-title { color:#fbbf24; font-weight:bold; font-size:0.72rem; }
    #wave-info .wi-boss  { color:#ef4444; font-weight:bold; }

    /* ── Info / upgrade panel ── */
    #info-panel {
      background:#16163a;
      padding:8px 10px;
      border-top:1px solid #2d2d4e;
      min-height:52px;
      flex-shrink:0;
    }
    #info-txt {
      font-size:0.75rem; color:#ccc;
      display:block; margin-bottom:5px;
      line-height:1.3;
    }
    #upgrade-btns {
      display:flex; gap:5px; flex-wrap:wrap;
    }
    #upgrade-btns button {
      padding:8px 11px;
      border-radius:6px; border:none;
      cursor:pointer; font-size:0.72rem; font-weight:bold;
      -webkit-tap-highlight-color:transparent;
      line-height:1.1;
    }
    #up-smelly    { background:#16a34a; color:#fff; }
    #up-bloody    { background:#b91c1c; color:#fff; }
    #up-lightning { background:#ca8a04; color:#fff; }
    #up-longkick  { background:#0369a1; color:#fff; }
    #up-phlegm       { background:#a16207; color:#fff; }
    #up-herpes       { background:#7e22ce; color:#fff; }
    #up-diarrhea     { background:#b45309; color:#fff; }
    #up-constipation { background:#292524; color:#fff; }
    #up-btn          { background:#2563eb; color:#fff; }
    #sell-btn     { background:#dc2626; color:#fff; }
    #upgrade-btns button:disabled { background:#555 !important; cursor:not-allowed; }
  </style>
</head>
<body>
<div id="wrapper">

  <div id="stats-bar">
    <div class="stat"><span class="val" id="s-money">150</span><span class="lbl">💰 Gold</span></div>
    <div class="stat"><span class="val" id="s-lives">20</span><span class="lbl">❤️ Lives</span></div>
    <div class="stat"><span class="val" id="s-wave">0</span><span class="lbl">Wave</span></div>
  </div>

  <canvas id="c"></canvas>

  <div id="tower-bar">
    <button id="wave-btn" onclick="sendWave()">▶ Wave 1</button>
    <div id="wave-info"><span class="wi-title">Next wave</span><br><span id="wave-info-detail">—</span></div>
  </div>

  <div id="info-panel">
    <span id="info-txt">Tap any green tile to build, or tap a tower to upgrade.</span>
    <div id="upgrade-btns">
      <button id="up-btn"       style="display:none" onclick="upgradeSelected()">Upgrade</button>
      <button id="up-smelly"    style="display:none" onclick="upgradeToVariant('smelly')">🟢 Smelly ($30)</button>
      <button id="up-bloody"    style="display:none" onclick="upgradeToVariant('bloody')">🔴 Bloody ($30)</button>
      <button id="up-lightning" style="display:none" onclick="upgradeToVariant('lightning')">⚡ Lightning ($40)</button>
      <button id="up-longkick"  style="display:none" onclick="upgradeToVariant('longkick')">🦵 Long ($40)</button>
      <button id="up-phlegm"    style="display:none" onclick="upgradeToVariant('phlegm')">🟡 Phlegm ($50)</button>
      <button id="up-herpes"       style="display:none" onclick="upgradeToVariant('herpes')">🟣 Herpes ($50)</button>
      <button id="up-diarrhea"     style="display:none" onclick="upgradeToVariant('diarrhea')">💦 Diarrhea ($60)</button>
      <button id="up-constipation" style="display:none" onclick="upgradeToVariant('constipation')">🪨 Constipation ($60)</button>
      <button id="sell-btn"        style="display:none" onclick="sellSelected()">Sell</button>
    </div>
  </div>

  <div id="tower-popup">
    <div id="popup-title"></div>
    <div id="popup-detail"></div>
    <div id="popup-btns"></div>
  </div>

  <div id="build-popup">
    <div id="build-popup-title">Choose tower</div>
    <div id="build-popup-btns"></div>
  </div>

</div>
<script>
// ═══════════════════════════════════════════════
//  CANVAS SETUP  (responsive tile size)
// ═══════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const COLS = 10, ROWS = 14;
const TILE = Math.floor(Math.min(window.innerWidth, 440) / COLS);
const W    = TILE * COLS;
const H    = TILE * ROWS;
canvas.width  = W;
canvas.height = H;

// ═══════════════════════════════════════════════
//  PATH DEFINITIONS (stage-aware)
// ═══════════════════════════════════════════════

// Stage 1: snake / zigzag pattern
const WP_GRID_S1 = [
  [0,1],[7,1],[7,4],[2,4],[2,7],[7,7],[7,10],[2,10],[2,13],[9,13]
];

// Stage 2: inward spiral maze — enemies spiral clockwise to the center
const WP_GRID_S2 = [
  [0,0],[9,0],
  [9,13],[0,13],[0,2],[8,2],
  [8,11],[1,11],[1,4],[7,4],
  [7,9],[2,9],[2,6],[6,6],
  [6,7],[4,7]
];

function buildPathSet(wpGrid) {
  const ps = new Set();
  for (let i = 0; i < wpGrid.length - 1; i++) {
    const [c1,r1] = wpGrid[i], [c2,r2] = wpGrid[i+1];
    if (r1 === r2)
      for (let c = Math.min(c1,c2); c <= Math.max(c1,c2); c++) ps.add(`${c},${r1}`);
    else
      for (let r = Math.min(r1,r2); r <= Math.max(r1,r2); r++) ps.add(`${c1},${r}`);
  }
  return ps;
}

const pathSet_S1 = buildPathSet(WP_GRID_S1);
const pathSet_S2 = buildPathSet(WP_GRID_S2);

const WAYPOINTS_S1 = [
  { x: -TILE/2, y: 1*TILE + TILE/2 },
  ...WP_GRID_S1.map(([c,r]) => ({ x: c*TILE+TILE/2, y: r*TILE+TILE/2 })),
  { x: W+TILE/2, y: 13*TILE + TILE/2 }
];

// Stage 2: entry from top-left, no off-screen exit — center tile IS the end
const WAYPOINTS_S2 = [
  { x: -TILE/2, y: 0*TILE + TILE/2 },
  ...WP_GRID_S2.map(([c,r]) => ({ x: c*TILE+TILE/2, y: r*TILE+TILE/2 }))
];

function currentPathSet() { return stage >= 2 ? pathSet_S2 : pathSet_S1; }
function currentWaypoints() { return stage >= 2 ? WAYPOINTS_S2 : WAYPOINTS_S1; }
function currentWpGrid() { return stage >= 2 ? WP_GRID_S2 : WP_GRID_S1; }

// ═══════════════════════════════════════════════
//  TOWER DEFINITIONS  (ranges scaled to TILE)
// ═══════════════════════════════════════════════
const DEFS = {
  fist: {
    name:'Fist Tower', icon:'👊', cost:10,
    damage:12, range:TILE*1.8,  fireRate:800,
    color:'#f97316', projIcon:'👊', projSpeed:TILE*5.5,
    dot:false,
    desc:'Low dmg • Short range • Fast attack'
  },
  kick: {
    name:'Kick Tower', icon:'🦶', cost:15,
    damage:30, range:TILE*3.0,  fireRate:1800,
    color:'#3b82f6', projIcon:'🦶', projSpeed:TILE*7,
    dot:false,
    desc:'Medium dmg • Medium range • Slow attack'
  },
  spit: {
    name:'Spit Tower', icon:'💧', cost:20,
    damage:7,  range:TILE*4.0,  fireRate:2500,
    color:'#a855f7', projIcon:'💦', projSpeed:TILE*4,
    dot:true, dotInterval:500, dotDuration:3000,
    desc:'DoT dmg • Long range • Very slow attack'
  },
  poop: {
    name:'Poop Tower', icon:'💩', cost:30,
    damage:20, range:TILE*5.8, fireRate:7000,
    color:'#78350f', projIcon:'💩', projSpeed:0,
    dot:false,
    desc:'Arc shot • Huge range • Poisons area for 3s'
  }
};

// ═══════════════════════════════════════════════
//  VARIANTS
// ═══════════════════════════════════════════════
const VARIANTS = {
  smelly: {
    name:'Smelly Fist', cost:30, forType:'fist', glowColor:'#22c55e',
    effect:'slow', slowDuration:1000, slowMult:0.35, chance:0.20,
    desc:'20% chance to slow enemy for 1s'
  },
  bloody: {
    name:'Bloody Fist', cost:30, forType:'fist', glowColor:'#ef4444',
    effect:'splash', splashRadius:TILE*1.7, splashRatio:0.5, chance:0.20,
    desc:'20% chance to splash damage nearby enemies'
  },
  lightning: {
    name:'Lightning Kick', cost:40, forType:'kick', glowColor:'#fbbf24',
    effect:'chain', chainCount:2, chainDmgRatio:0.65, chance:0.20,
    desc:'20% chance to chain lightning to 3 enemies'
  },
  longkick: {
    name:'Long Kick', cost:40, forType:'kick', glowColor:'#38bdf8',
    icon:'🦵', projIcon:'🦵',
    effect:'farthest', farDmgMult:1.5, chance:0.20, rangeMult:1.9,
    desc:'20% chance to target the farthest enemy'
  },
  phlegm: {
    name:'Phlegm Spit', cost:50, forType:'spit', glowColor:'#eab308',
    effect:'aoe_slow', slowRadius:TILE*1.8, slowDuration:2500, slowMult:0.35, chance:0.20,
    desc:'20% chance to AoE slow nearby enemies for 2.5s'
  },
  herpes: {
    name:'Herpes Spit', cost:50, forType:'spit', glowColor:'#a855f7',
    effect:'vulnerable', vulnDuration:4000, vulnMult:2, chance:0.20,
    desc:'20% chance: enemy takes 200% damage for 4s'
  },
  diarrhea: {
    name:'Diarrhea', cost:60, forType:'poop', glowColor:'#b45309',
    icon:'💦', projIcon:'💦',
    fireRateMult:0.42,
    splatDuration:3.0,
    dotDmgMult:1.0,
    desc:'Faster attack • Brown water arc'
  },
  constipation: {
    name:'Constipation', cost:60, forType:'poop', glowColor:'#292524',
    icon:'🪨', projIcon:'💩',
    fireRateMult:1.0,
    splatDuration:6.0,
    dotDmgMult:4.0,
    desc:'Splat lasts 6s • 4× poison damage'
  }
};

// ═══════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resumeAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }
document.addEventListener('click', resumeAudio, { once: true });
document.addEventListener('touchstart', resumeAudio, { once: true });

function playSound(type) {
  try {
    const g = audioCtx.createGain();
    g.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'fist') {
      // Short punchy thud
      const o = audioCtx.createOscillator();
      o.connect(g);
      o.type = 'sine';
      o.frequency.setValueAtTime(120, now);
      o.frequency.exponentialRampToValueAtTime(40, now + 0.08);
      g.gain.setValueAtTime(0.55, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      o.start(now); o.stop(now + 0.1);
    } else if (type === 'kick') {
      // Deep kick thump
      const o = audioCtx.createOscillator();
      o.connect(g);
      o.type = 'sine';
      o.frequency.setValueAtTime(200, now);
      o.frequency.exponentialRampToValueAtTime(35, now + 0.18);
      g.gain.setValueAtTime(0.7, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      o.start(now); o.stop(now + 0.22);
    } else if (type === 'spit') {
      // Wet splat
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.12, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const f = audioCtx.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.value = 800; f.Q.value = 0.8;
      src.connect(f); f.connect(g);
      g.gain.setValueAtTime(0.35, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      src.start(now);
    } else if (type === 'death') {
      const o = audioCtx.createOscillator();
      o.connect(g);
      o.type = 'square';
      o.frequency.setValueAtTime(520, now);
      o.frequency.exponentialRampToValueAtTime(80, now + 0.25);
      g.gain.setValueAtTime(0.28, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
      o.start(now); o.stop(now + 0.28);
    } else if (type === 'poop') {
      // Wet splat thud
      const o = audioCtx.createOscillator();
      o.connect(g); o.type = 'sine';
      o.frequency.setValueAtTime(90, now);
      o.frequency.exponentialRampToValueAtTime(30, now + 0.18);
      g.gain.setValueAtTime(0.65, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      o.start(now); o.stop(now + 0.22);
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
      const d2 = buf.getChannelData(0);
      for (let i=0;i<d2.length;i++) d2[i]=(Math.random()*2-1)*(1-i/d2.length);
      const src2 = audioCtx.createBufferSource(); src2.buffer = buf;
      const g2 = audioCtx.createGain(); g2.connect(audioCtx.destination);
      src2.connect(g2); g2.gain.setValueAtTime(0.25, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now+0.12);
      src2.start(now);
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
let money=150, lives=20, wave=0, stage=1;
let state='idle';
let bossWarnTimer=0;

let towers=[], enemies=[], projectiles=[], particles=[], chainEffects=[], poopSplats=[];
let tId=0, eId=0, pId=0;
let spawnQueue=[], spawnTimer=0, lastTs=0;

let touchCol=-1, touchRow=-1;
let buildPopupCol=-1, buildPopupRow=-1;
let selType=null, selTId=null;
let suppressNextTap=false;

// ═══════════════════════════════════════════════
//  WAVE SYSTEM
// ═══════════════════════════════════════════════
function waveCfg(n) {
  const PIVOT = 6, PIVOT2 = 20;
  let hp;
  if (n <= PIVOT)
    hp = Math.floor(80 * Math.pow(1.35, n));
  else if (n <= PIVOT2)
    hp = Math.floor(80 * Math.pow(1.35, PIVOT) * Math.pow(1.18, n - PIVOT));
  else
    hp = Math.floor(80 * Math.pow(1.35, PIVOT) * Math.pow(1.18, PIVOT2 - PIVOT) * Math.pow(1.25, n - PIVOT2));
  const spd = n <= PIVOT
    ? 44 + n * 3
    : (44 + PIVOT * 3) + Math.floor((n - PIVOT) * 1.5);
  hp = Math.floor(hp * (1 + (stage - 1) * 0.5));
  if (n > 20) hp = Math.floor(hp * 1.2);
  return { count:6+n*2, hp, speed:spd, reward:2+Math.floor(n*0.6) };
}

function isBossWave(n) { return n % 10 === 0; }
function isFinalBoss(n) { return n === 30; }
function bossMult(n) {
  if (n === 30) return 1.05 * 0.95;
  if (n === 20) return 1.05 * 1.5;
  if (n === 10) return 1.05 * 1.2;
  return 1.05;
}

function sendWave() {
  if (state === 'victory') {
    stage++;
    wave = 0;
    state = 'idle';
    towers = []; enemies = []; projectiles = [];
    particles = []; chainEffects = []; poopSplats = [];
    selTId = null; clearInfo();
    const bonus = 300;
    money += bonus;
    refreshUI();
    document.getElementById('info-txt').textContent =
      `🌟 Stage ${stage} — Spiral Maze! Enemies are 50% stronger. +$${bonus} bonus. Build towers on the maze walls!`;
    hideAllUpgrades();
    document.getElementById('sell-btn').style.display = 'none';
    return;
  }
  if (state!=='idle') return;
  wave++;
  if (isBossWave(wave)) {
    state = 'boss-warning';
    bossWarnTimer = isFinalBoss(wave) ? 4.0 : 3.0;
  } else {
    launchWave();
  }
  refreshUI();
}

function launchWave() {
  state = 'wave';
  if (isBossWave(wave)) {
    const prev = waveCfg(wave - 1);
    const bossHp = Math.floor(prev.count * prev.hp * bossMult(wave));
    const bossReward = Math.floor(prev.count * prev.reward * 2);
    spawnQueue = [{ hp:bossHp, speed:13.5, reward:bossReward, boss:true }];
  } else {
    const cfg = waveCfg(wave);
    const hp = wave <= 19 ? Math.floor(cfg.hp * 1.5) : cfg.hp;
    spawnQueue = Array.from({length:cfg.count}, ()=>({...cfg, hp}));
  }
  spawnTimer = 0;
}

function spawnEnemy(cfg) {
  enemies.push({
    id:eId++, alive:true,
    hp:cfg.hp, maxHp:cfg.hp,
    speed:cfg.speed, baseSpeed:cfg.speed, reward:cfg.reward,
    wpIdx:0,
    x:currentWaypoints()[0].x, y:currentWaypoints()[0].y,
    dots:[], slow:0, slowMult:VARIANTS.smelly.slowMult, vulnerable:0, vulnMult:VARIANTS.herpes.vulnMult,
    boss: cfg.boss || false
  });
}

// ═══════════════════════════════════════════════
//  DAMAGE HELPER
// ═══════════════════════════════════════════════
function dealDamage(e, dmg) {
  const actual = e.vulnerable > 0 ? Math.floor(dmg * e.vulnMult) : dmg;
  e.hp -= actual;
  return actual;
}

// ═══════════════════════════════════════════════
//  TOWER ACTIONS
// ═══════════════════════════════════════════════
function placeTower(col, row) {
  if (!selType) return;
  const def = DEFS[selType];
  if (money < def.cost) return;
  if (col<0||col>=COLS||row<0||row>=ROWS) return;
  if (currentPathSet().has(`${col},${row}`)) return;
  if (towers.some(t=>t.col===col&&t.row===row)) return;
  money -= def.cost;
  towers.push({
    id:tId++, type:selType, col, row,
    x:col*TILE+TILE/2, y:row*TILE+TILE/2,
    level:1, variant:null,
    damage:def.damage, range:def.range, fireRate:def.fireRate, lastShot:0,
    totalSpent:def.cost
  });
  refreshUI();
}

function upgradeSelected() {
  const t = towers.find(t=>t.id===selTId);
  if (!t||t.level>=3) return;
  const cost = Math.floor(DEFS[t.type].cost * 0.75);
  if (money < cost) return;
  money -= cost;
  t.level++;
  t.damage = Math.floor(DEFS[t.type].damage * (1+0.5*(t.level-1)));
  t.range  = Math.floor(DEFS[t.type].range  * (1+0.1*(t.level-1)));
  selTId = null; clearInfo(); refreshUI();
  suppressNextTap = true; setTimeout(() => suppressNextTap = false, 450);
}

function upgradeToVariant(key) {
  const t = towers.find(t=>t.id===selTId);
  if (!t||t.variant!==null) return;
  const v = VARIANTS[key];
  if (v.forType && t.type!==v.forType) return;
  if (money < v.cost) return;
  money -= v.cost;
  t.variant = key; t.level = 2;
  t.totalSpent = (t.totalSpent || 0) + v.cost;
  if (v.rangeMult)    t.range    = Math.floor(t.range    * v.rangeMult);
  if (v.fireRateMult) t.fireRate = Math.floor(t.fireRate * v.fireRateMult);
  selTId = null; clearInfo(); refreshUI();
  suppressNextTap = true; setTimeout(() => suppressNextTap = false, 450);
}

function sellSelected() {
  const idx = towers.findIndex(t=>t.id===selTId);
  if (idx===-1) return;
  const t = towers[idx];
  money += t.totalSpent != null ? t.totalSpent : (t.fusion ? DEFS[t.type].cost * 2 : DEFS[t.type].cost);
  towers.splice(idx,1);
  selTId = null; clearInfo(); refreshUI();
}

// ── Fusion helpers ──
function getFusionCandidates(t) {
  if (t.level !== 2 || !t.variant || t.fusion) return [];
  const dirs = [{dc:-1,dr:0,name:'Left'},{dc:1,dr:0,name:'Right'},{dc:0,dr:-1,name:'Up'},{dc:0,dr:1,name:'Down'}];
  return dirs.reduce((acc,{dc,dr,name}) => {
    const adj = towers.find(a => a.col===t.col+dc && a.row===t.row+dr &&
      a.type===t.type && a.level===2 && a.variant!==null && !a.fusion && a.id!==t.id &&
      a.variant !== t.variant);
    if (adj) acc.push({tower:adj, dir:name});
    return acc;
  }, []);
}

function fusedName(v1k, v2k, baseType) {
  const tName = {fist:'Fist',kick:'Kick',spit:'Spit',poop:'Poop'}[baseType];
  if (v1k === v2k) {
    const p = {smelly:'So Smelly',bloody:'Gory',lightning:'Thunderstorm',longkick:'Ultra Long',
               phlegm:'Toxic Phlegm',herpes:'Epidemic',diarrhea:'Explosive Diarrhea',constipation:'Mega Constipation'};
    return `${p[v1k]||'Mega'} ${tName}`;
  }
  const strip = s => VARIANTS[s].name.replace(/ ?(Fist|Kick|Spit|Poop)$/,'');
  return `${strip(v1k)} ${strip(v2k)} ${tName}`;
}

function lv2UpgradeCost(t) {
  return VARIANTS[t.variant].cost * 2;
}

function upgradeLv2Tower() {
  const t = towers.find(t => t.id===selTId);
  if (!t || t.level !== 2 || !t.variant || t.fusion) return;
  const cost = lv2UpgradeCost(t);
  if (money < cost) return;
  money -= cost;
  t.totalSpent = (t.totalSpent || 0) + cost;
  t.damage *= 2;
  t.level   = 3;
  t.boosted = true;
  if (t.variant === 'longkick') t.range = Math.floor(t.range * 1.3);
  if (t.variant === 'diarrhea') t.fireRate = Math.floor(t.fireRate * 0.5);
  selTId = null; clearInfo(); refreshUI();
  suppressNextTap = true; setTimeout(() => suppressNextTap = false, 450);
}

function fuseTower(targetId) {
  const sel = towers.find(t => t.id===selTId);
  const con = towers.find(t => t.id===targetId);
  if (!sel || !con || sel.type !== con.type) return;
  const fuseCost = VARIANTS[sel.variant].cost;
  if (money < fuseCost) return;
  money -= fuseCost;
  sel.totalSpent = (sel.totalSpent || 0) + (con.totalSpent || 0) + fuseCost;
  sel.fusion   = [sel.variant, con.variant];
  sel.damage   = sel.damage + con.damage;
  sel.fireRate = Math.floor((sel.fireRate + con.fireRate) / 2);
  sel.range    = Math.max(sel.range, con.range);
  sel.level    = 3;
  towers.splice(towers.findIndex(t => t.id===targetId), 1);
  selTId = null; clearInfo(); refreshUI();
  suppressNextTap = true; setTimeout(() => suppressNextTap = false, 450);
}

  const variants = t.fusion ? t.fusion : (t.variant ? [t.variant] : []);
  return variants.reduce((sum, vk) => sum + VARIANTS[vk].cost, 0);
}

}

  sel.totalSpent = (sel.totalSpent || 0) + (con.totalSpent || 0) + fuseCost;

// isFused=true when the tower has 2+ variants merged — each ability is half strength
function applyVariantEffect(e, vKey, p, boosted, isLv5 = false, isFused = false) {
  if (vKey === 'longkick') {
    let killChance = isLv5 ? 0.07 : (boosted ? 0.05 : 0);
    if (isFused) killChance *= 0.5;
    if (killChance > 0 && !e.boss && Math.random() < killChance) {
      e.hp = 0;
      addParticle(e.x, e.y-22, '💀 INSTANT!', '#38bdf8');
    }
    return;
  }
  const v = VARIANTS[vKey];
  if (!v || !v.effect) return;
  let chance = isLv5
    ? Math.min(0.50, v.chance * 2.5)
    : boosted ? Math.min(0.55, v.chance * 2) : v.chance;
  if (isFused) chance *= 0.5;
  if (Math.random() >= chance) return;
  // T controls duration/radius; for fused towers halve the bonus portion (T-1)
  let T = isLv5 ? 2.5 : (boosted ? 2.0 : 1.0);
  if (isFused) T = 1 + (T - 1) * 0.5;
  if (v.effect === 'slow') {
    let dur = v.slowDuration * T;
    let mag = isLv5 ? v.slowMult * 0.4 : boosted ? v.slowMult * 0.5 : v.slowMult;
    if (isFused) mag = 1 - (1 - mag) * 0.5;
    if (e.boss) { dur *= 0.5; mag = 1 - (1 - mag) * 0.5; }
    e.slow = dur;
    e.slowMult = mag;
    addParticle(e.x, e.y-22, isLv5 ? '❄❄❄ BLIZZARD!' : boosted ? '❄❄ FROZEN!' : '❄ SLOW!', '#67e8f9');
  } else if (v.effect === 'splash') {
    const ratio  = Math.min(isLv5 ? 1.5 : 1.0, v.splashRatio * T);
    const radius = v.splashRadius * T;
    const sd = Math.floor(p.damage * ratio);
    for (const ne of enemies) {
      if (ne.id!==e.id && ne.alive && Math.hypot(ne.x-e.x,ne.y-e.y)<=radius) {
        const nd = dealDamage(ne, sd);
        addParticle(ne.x, ne.y-11, `-${nd}`, '#fca5a5');
      }
    }
    addParticle(e.x, e.y-22, isLv5 ? '💥💥💥 NOVA SPLASH!' : boosted ? '💥💥 MEGA SPLASH!' : '💥 SPLASH!', '#f87171');
  } else if (v.effect === 'chain') {
    let chainCount = isLv5 ? v.chainCount * 4 : boosted ? v.chainCount * 3 : v.chainCount;
    if (isFused) chainCount = Math.max(1, Math.ceil(chainCount * 0.5));
    let from = e, cdmg = p.damage;
    const done = new Set([e.id]);
    for (let i = 0; i < chainCount; i++) {
      cdmg = Math.floor(cdmg * v.chainDmgRatio);
      let next = null, minD = Infinity;
      for (const ne of enemies) {
        if (done.has(ne.id) || !ne.alive) continue;
        const d = Math.hypot(ne.x-from.x, ne.y-from.y);
        if (d < minD) { minD = d; next = ne; }
      }
      if (!next) break;
      done.add(next.id);
      const cd = dealDamage(next, cdmg);
      addParticle(next.x, next.y-11, `⚡-${cd}`, '#fbbf24');
      chainEffects.push({x1:from.x,y1:from.y,x2:next.x,y2:next.y,life:0.45,maxLife:0.45});
      from = next;
    }
    addParticle(e.x, e.y-22, isLv5 ? '⚡⚡⚡ STORM!' : '⚡ CHAIN!', '#fbbf24');
  } else if (v.effect === 'aoe_slow') {
    let dur    = v.slowDuration * T;
    const radius = v.slowRadius * T;
    let mag = isLv5 ? v.slowMult * 0.4 : boosted ? v.slowMult * 0.5 : v.slowMult;
    if (isFused) mag = 1 - (1 - mag) * 0.5;
    const applySlowTo = (en) => {
      let d = dur, m = mag;
      if (en.boss) { d *= 0.5; m = 1 - (1 - m) * 0.5; }
      en.slow = d; en.slowMult = m;
    };
    applySlowTo(e);
    for (const ne of enemies) {
      if (ne.id!==e.id && ne.alive && Math.hypot(ne.x-e.x,ne.y-e.y)<=radius) {
        applySlowTo(ne);
      }
    }
    addParticle(e.x, e.y-22, isLv5 ? '🟡🟡🟡 MIASMA!' : boosted ? '🟡🟡 TOXIC PHLEGM!' : '🟡 PHLEGM!', '#eab308');
  } else if (v.effect === 'vulnerable') {
    const pLevel = p.level || 2;
    const baseDur = Math.floor(v.vulnDuration * Math.pow(1.5, Math.max(0, pLevel - 2)));
    const dur = isFused ? Math.floor(baseDur * 0.5) : baseDur;
    let mult = isLv5 ? v.vulnMult * 2.5 : boosted ? v.vulnMult * 2 : v.vulnMult;
    if (isFused) mult = 1 + (mult - 1) * 0.5;  // halve the damage bonus
    e.vulnerable = dur;
    e.vulnMult   = mult;
    addParticle(e.x, e.y-22, isLv5 ? '🦠🦠🦠 PLAGUE!' : boosted ? '🦠🦠 EPIDEMIC!' : '🦠 INFECTED!', '#a855f7');
  }
}

// ═══════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════
const ALL_UP_IDS = ['up-btn','up-smelly','up-bloody','up-lightning','up-longkick','up-phlegm','up-herpes','up-diarrhea','up-constipation'];

function refreshUI() {
  document.getElementById('s-money').textContent = money;
  document.getElementById('s-lives').textContent = lives;
  document.getElementById('s-wave').textContent  = stage > 1 ? `S${stage}·${wave}` : wave;

  const wb   = document.getElementById('wave-btn');
  const info = document.getElementById('wave-info-detail');
  const next = wave + 1;

  if (state==='wave') {
    wb.textContent = '⏳ In progress…'; wb.disabled = true;
    info.innerHTML = '';
  } else if (state==='boss-warning') {
    if (isFinalBoss(wave)) {
      wb.textContent = '☠️ FINAL BOSS!'; wb.disabled = true;
      info.innerHTML = `<span class="wi-boss">☠️ FINAL BOSS — Defeat it or it's all over!</span>`;
    } else {
      wb.textContent = '⚠️ Boss incoming!'; wb.disabled = true;
      info.innerHTML = `<span class="wi-boss">💀 Boss wave — prepare!</span>`;
    }
  } else if (state==='gameover') {
    wb.textContent = 'Game Over'; wb.disabled = true;
    info.innerHTML = '';
  } else if (state==='victory') {
    wb.textContent = `🌟 Stage ${stage + 1}`; wb.disabled = false;
    info.innerHTML = `<span style="color:#fbbf24;font-weight:bold">🏆 STAGE CLEAR! Press to continue</span>`;
  } else {
    const isBoss = isBossWave(next);
    const isFinal = isFinalBoss(next);
    const wLabel = stage > 1 ? `S${stage} Wave ${next}` : `Wave ${next}`;
    wb.textContent = isFinal ? `☠️ FINAL BOSS` : isBoss ? `💀 ${wLabel}` : `▶ ${wLabel}`;
    wb.disabled = false;
    if (isBoss) {
      const prev = waveCfg(next - 1);
      const bossHp = Math.floor(prev.count * prev.hp * bossMult(next));
      const tag = isFinal ? '☠️ FINAL BOSS' : '💀 BOSS';
      info.innerHTML = `<span class="wi-boss">${tag} — ${bossHp.toLocaleString()} HP</span>`;
    } else {
      const cfg = waveCfg(next);
      const displayHp = next <= 19 ? Math.floor(cfg.hp * 1.5) : cfg.hp;
      info.innerHTML = `👾 ×${cfg.count} &nbsp;❤️ ${displayHp.toLocaleString()} &nbsp;💨 ${cfg.speed}`;
    }
  }
}

function hideAllUpgrades() {
  ALL_UP_IDS.forEach(id => document.getElementById(id).style.display='none');
}

function showBtn(id, label, disabled) {
  const b = document.getElementById(id);
  b.style.display = 'inline-block';
  b.textContent   = label;
  b.disabled      = disabled;
}

function showTowerInfo(t) {
  const def  = DEFS[t.type];
  const txt  = document.getElementById('info-txt');

  if (t.type==='fist' && t.variant===null) {
    txt.textContent = `👊 Fist | Lv1 | Dmg:${t.damage} | Choose upgrade:`;
    showBtn('up-smelly',   `🟢 Smelly ($${VARIANTS.smelly.cost})`,   money<VARIANTS.smelly.cost);
    showBtn('up-bloody',   `🔴 Bloody ($${VARIANTS.bloody.cost})`,   money<VARIANTS.bloody.cost);
  } else if (t.type==='kick' && t.variant===null) {
    txt.textContent = `🦵 Kick | Lv1 | Dmg:${t.damage} | Choose upgrade:`;
    showBtn('up-lightning',`⚡ Lightning ($${VARIANTS.lightning.cost})`, money<VARIANTS.lightning.cost);
    showBtn('up-longkick', `🦵 Long Kick ($${VARIANTS.longkick.cost})`,  money<VARIANTS.longkick.cost);
  } else if (t.type==='spit' && t.variant===null) {
    txt.textContent = `💧 Spit | Lv1 | DoT:${t.damage}/tick | Choose upgrade:`;
    showBtn('up-phlegm', `🟡 Phlegm ($${VARIANTS.phlegm.cost})`, money<VARIANTS.phlegm.cost);
    showBtn('up-herpes', `🟣 Herpes ($${VARIANTS.herpes.cost})`, money<VARIANTS.herpes.cost);
  } else if (t.type==='poop' && t.variant===null) {
    txt.textContent = `💩 Poop | Lv1 | DoT:${t.damage}/tick | Choose upgrade:`;
    showBtn('up-diarrhea',     `💦 Diarrhea ($${VARIANTS.diarrhea.cost})`,         money<VARIANTS.diarrhea.cost);
    showBtn('up-constipation', `🪨 Constipation ($${VARIANTS.constipation.cost})`, money<VARIANTS.constipation.cost);
  } else if (t.fusion && t.level === 5) {
    const lbl = t.boosted ? 'Lv5 ⬆' : 'Lv5';
    txt.textContent = `💎 ${fusedNameLv5(t.fusion, t.type)} | ${lbl} | Dmg:${t.damage}`;
  } else if (t.fusion && t.level === 4) {
    const lbl = t.boosted ? 'Lv4 ⬆' : 'Lv4';
    txt.textContent = `⚜ ${fusedNameLv4(t.fusion, t.type)} | ${lbl} | Dmg:${t.damage}`;
  } else if (t.fusion) {
    txt.textContent = `✦ ${fusedName(t.fusion[0],t.fusion[1],t.type)} | Lv3 | Dmg:${t.damage}`;
  } else if (t.variant!==null) {
    const v = VARIANTS[t.variant];
    const icons = {smelly:'🟢',bloody:'🔴',lightning:'⚡',longkick:'🦵',phlegm:'🟡',herpes:'🟣',diarrhea:'💦',constipation:'🪨'};
    const lbl = t.boosted ? 'Lv3 ⬆ BOOSTED' : 'Lv2';
    txt.textContent = `${icons[t.variant]} ${v.name} | ${lbl} | Dmg:${t.damage}`;
  } else {
    const ucost = Math.floor(def.cost*0.75);
    txt.textContent = `${def.icon} ${def.name} | Lv${t.level}/3 | Dmg:${t.damage}`;
    if (t.level<3) showBtn('up-btn', `Upgrade ($${ucost})`, money<ucost);
  }
  const sell = t.totalSpent != null ? t.totalSpent : (t.fusion ? DEFS[t.type].cost * 2 : def.cost);
  showBtn('sell-btn', `Sell ($${sell})`, false);
  showPopup(t);
}

function clearInfo() {

  document.getElementById('sell-btn').style.display = 'none';
  hidePopup();

  document.getElementById('tower-popup').style.display = 'none';
  document.getElementById('popup-detail').style.display = 'none';
}

function hideBuildPopup() {
  document.getElementById('build-popup').style.display = 'none';

function showBuildPopup(col, row) {
  hideBuildPopup();
  const popup = document.getElementById('build-popup');
  const btns  = document.getElementById('build-popup-btns');
  btns.innerHTML = '';
  buildPopupCol = col; buildPopupRow = row;

  for (const [type, def] of Object.entries(DEFS)) {
    const b = document.createElement('button');
    b.className = 'bpbtn';
    b.disabled  = money < def.cost;
    const bnames = {fist:'Fist', kick:'Foot', spit:'Spit', poop:'Poop'};
    b.innerHTML = `<span class="bico">${def.icon}</span><span class="bname">${bnames[type]||type}</span><span class="bcst">$${def.cost}</span>`;
    b.onclick = () => {
      const c = buildPopupCol, r = buildPopupRow;
      hideBuildPopup();
      selType = type;
      placeTower(c, r);
      selType = null;
      suppressNextTap = true;
      setTimeout(() => suppressNextTap = false, 450);
      refreshUI();
    };
    btns.appendChild(b);
  }

  // Position above the tile
  const rect  = canvas.getBoundingClientRect();
  const wRect = document.getElementById('wrapper').getBoundingClientRect();
  const scaleX = rect.width / W;
  const scaleY = rect.height / H;
  const tx = rect.left - wRect.left + (col * TILE + TILE / 2) * scaleX;
  const ty = rect.top  - wRect.top  + (row * TILE + TILE / 2) * scaleY;

  popup.style.display = 'block';
  const pw = popup.offsetWidth || 175;
  const ph = popup.offsetHeight || 80;
  let left = tx - pw / 2;
  let top  = ty - TILE * scaleY - ph - 6;
  const statsH = document.getElementById('stats-bar').offsetHeight;
  if (top < statsH) top = ty + TILE * scaleY + 6;
  left = Math.max(4, Math.min(left, wRect.width - pw - 4));
  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';
}

function getSkillDesc(vKey, boosted, isLv5 = false, level = 2) {
  const v = VARIANTS[vKey];
  const pct = n => Math.round(n * 100);
  const ch = isLv5
    ? Math.min(50, pct(v.chance) * 2.5)
    : boosted ? Math.min(55, pct(v.chance) * 2) : pct(v.chance);
  if (vKey==='smelly')       return isLv5
    ? `❄❄❄ Slow ${ch}% · 2.5s · 3× intense`
    : boosted ? `❄❄ Slow ${ch}% · 2s · 2× intensity` : `❄ Slow ${ch}% · 1s`;
  if (vKey==='bloody')       return isLv5
    ? `💥💥💥 Splash ${ch}% · 2.5× area · 1.5× dmg`
    : boosted ? `💥 Splash ${ch}% · 2× area · 2× dmg` : `💥 Splash ${ch}%`;
  if (vKey==='lightning')    return isLv5
    ? `⚡⚡⚡ Chain ${ch}% → 8 enemies`
    : `⚡ Chain ${ch}% → ${boosted?6:2} enemies`;
  if (vKey==='longkick')     return isLv5
    ? `🦵💀 Farthest · 7% instant kill`
    : boosted ? `🦵 Farthest · extra range · 5% instant kill` : `🦵 Farthest target`;
  if (vKey==='phlegm')       return isLv5
    ? `🟡🟡🟡 AoE Slow ${ch}% · 6.25s · 2.5× area`
    : boosted ? `🟡🟡 AoE Slow ${ch}% · 5s · 2× area · 2× intensity` : `🟡 AoE Slow ${ch}% · 2.5s`;
  if (vKey==='herpes') {
    const dur = +(v.vulnDuration * Math.pow(1.5, Math.max(0, level - 2)) / 1000).toFixed(1);
    const mult = isLv5 ? v.vulnMult * 2.5 : boosted ? v.vulnMult*2 : v.vulnMult;
    return `🦠${isLv5?'🦠🦠':boosted?'🦠':''} Vuln ${ch}% · ${mult}× dmg · ${dur}s`;
  }
  if (vKey==='diarrhea')     return isLv5
    ? `💦💦💦 2× fire rate · 2× DoT`
    : boosted ? `💦💦 2× fire rate · 2× DoT` : `💦 Fast fire · 3s splat`;
  if (vKey==='constipation') return isLv5
    ? `🪨🪨🪨 7.5s splat · 5× DoT · 2.5× area`
    : boosted ? `🪨🪨 6s splat · 5× DoT · 2× area` : `🪨 6s splat · 4× DoT`;
  return v.desc || '';
}

function toggleTowerDetail() {
  const d = document.getElementById('popup-detail');
  if (d.style.display === 'block') { d.style.display = 'none'; return; }
  const t = towers.find(t => t.id === selTId);
  if (!t) return;
  d.innerHTML = getDetailHTML(t);
  d.style.display = 'block';
}

function getDetailHTML(t) {
  const isLv5 = t.level >= 5;
  const boosted = t.boosted || false;
  const variants = t.fusion ? t.fusion : (t.variant ? [t.variant] : []);
  let html = `<div style="color:#f59e0b;font-size:0.63rem;font-weight:bold;margin-bottom:4px">📖 Ability Details</div>`;
  if (variants.length === 0) {
    const def = DEFS[t.type];
    html += `<div>${def.desc}</div>`;
  } else {
    html += variants.map(vk => `<div style="margin-bottom:5px">${getVariantDetail(vk, isLv5, boosted, t.level)}</div>`).join('');
  }
  return html;
}

function getVariantDetail(vk, isLv5, boosted, level) {
  const v = VARIANTS[vk];
  if (!v) return '';
  const ch = isLv5
    ? Math.min(50, Math.round(v.chance * 2.5 * 100))
    : boosted ? Math.min(55, Math.round(v.chance * 2 * 100)) : Math.round(v.chance * 100);
  const it = s => `<i style="color:#9ca3af">${s}</i>`;
  switch (vk) {
    case 'smelly': {
      const dur = isLv5 ? 2.5 : (boosted ? 2.0 : 1.0);
      const slowPct = isLv5 ? 86 : (boosted ? 83 : 65);
      return `Each attack has <b>${ch}%</b> chance to <b>Slow</b> the target by ${slowPct}% for ${dur}s.<br>${it('Slow: reduces enemy movement speed.')}`;
    }
    case 'bloody': {
      const T = isLv5 ? 2.5 : (boosted ? 2 : 1);
      const ratio = Math.round(Math.min(isLv5 ? 1.5 : 1.0, v.splashRatio * T) * 100);
      const radius = ((v.splashRadius * T) / TILE).toFixed(1);
      return `Each attack has <b>${ch}%</b> chance to <b>Splash</b> ${ratio}% of attack damage to enemies within ${radius} tiles.<br>${it('Splash: area burst hits all nearby enemies.')}`;
    }
    case 'lightning': {
      const jumps = isLv5 ? v.chainCount * 4 : (boosted ? v.chainCount * 3 : v.chainCount);
      return `Each attack has <b>${ch}%</b> chance to chain lightning to <b>${jumps}</b> additional enemies. Each jump deals ${Math.round(v.chainDmgRatio*100)}% of the previous hit's damage.<br>${it('Chain: lightning jumps between enemies.')}`;
    }
    case 'longkick': {
      const killPct = isLv5 ? 7 : (boosted ? 5 : 0);
      const killLine = killPct > 0 ? `<br><b>${killPct}%</b> chance to <b>Instantly Kill</b> non-boss enemies.` : '';
      return `Always targets the <b>farthest enemy</b> in range (range ×1.9).${killLine}<br>${it('Instant Kill: eliminates regardless of remaining HP.')}`;
    }
    case 'phlegm': {
      const T = isLv5 ? 2.5 : (boosted ? 2 : 1);
      const dur = (v.slowDuration * T / 1000).toFixed(1);
      const radius = ((v.slowRadius * T) / TILE).toFixed(1);
      const slowPct = isLv5 ? 86 : (boosted ? 83 : 65);
      return `Each attack has <b>${ch}%</b> chance to slow <b>ALL enemies</b> within ${radius} tiles by ${slowPct}% for ${dur}s.<br>${it('AoE Slow: slows all nearby enemies simultaneously.')}`;
    }
    case 'herpes': {
      const dur = +(v.vulnDuration * Math.pow(1.5, Math.max(0, level - 2)) / 1000).toFixed(1);
      const mult = isLv5 ? v.vulnMult * 2.5 : (boosted ? v.vulnMult*2 : v.vulnMult);
      return `Each attack has <b>${ch}%</b> chance to make the enemy <b>Vulnerable</b> for ${dur}s. Vulnerable enemy takes <b>${mult}× damage</b> from ALL sources.<br>${it('Vulnerability: amplifies all damage received — synergizes with other towers!')}`;
    }
    case 'diarrhea': {
      const dotM = isLv5 ? '2×' : (boosted ? '2×' : '1×');
      return `Fires <b>2.4× faster</b> than base poop tower. Leaves a brown puddle dealing DoT. DoT multiplier: <b>${dotM}</b>.<br>${it('Fast fire: far more frequent attacks than normal poop.')}`;
    }
    case 'constipation': {
      const splatDur = isLv5 ? 7.5 : 6;
      const dotM = isLv5 ? '5×' : (boosted ? '5×' : '4×');
      const radM = isLv5 ? '2.5×' : (boosted ? '2×' : '1×');
      return `Leaves a <b>${splatDur}s splat</b> dealing <b>${dotM}</b> DoT. Splat radius: <b>${radM}</b> base.<br>${it('Splat: lingering zone that damages all enemies passing through.')}`;
    }
    default:
      return v.desc || '';
  }
}

function towerStatsHTML(t) {
  const def  = DEFS[t.type];
  const spd  = (1000 / t.fireRate).toFixed(1);
  const rng  = (t.range / TILE).toFixed(1);
  let nameLine, skillLine;
  if (t.fusion && t.level === 5) {
    const lvColor = t.boosted ? '#ff6b35' : '#ef4444';
    const lvLabel = t.boosted ? 'Lv5 ⬆' : 'Lv5';
    nameLine  = `💎 ${fusedNameLv5(t.fusion, t.type)} <span style="color:${lvColor}">(${lvLabel})</span>`;
    skillLine = t.fusion.map(vk => getSkillDesc(vk, t.boosted||false, true, t.level)).join('<br>');
  } else if (t.fusion && t.level === 4) {
    const lvColor = t.boosted ? '#ffd700' : '#c4b5fd';
    const lvLabel = t.boosted ? 'Lv4 ⬆' : 'Lv4';
    nameLine  = `⚜ ${fusedNameLv4(t.fusion, t.type)} <span style="color:${lvColor}">(${lvLabel})</span>`;
    skillLine = t.fusion.map(vk => getSkillDesc(vk, t.boosted||false, false, t.level)).join('<br>');
  } else if (t.fusion) {
    nameLine  = `✦ ${fusedName(t.fusion[0],t.fusion[1],t.type)} <span style="color:#c4b5fd">(Lv3)</span>`;
    const [v1k,v2k] = t.fusion;
    skillLine = `${getSkillDesc(v1k, false, false, 3)}<br>${getSkillDesc(v2k, false, false, 3)}`;
  } else if (t.variant) {
    const vicons = {smelly:'🟢',bloody:'🔴',lightning:'⚡',longkick:'🦵',phlegm:'🟡',herpes:'🟣',diarrhea:'💦',constipation:'🪨'};
    const lvColor = t.boosted ? '#c4b5fd' : '#fbbf24';
    const lvLabel = t.boosted ? 'Lv3 ⬆' : 'Lv2';
    nameLine  = `${vicons[t.variant]||''} ${VARIANTS[t.variant].name} <span style="color:${lvColor}">(${lvLabel})</span>`;
    skillLine = getSkillDesc(t.variant, t.boosted||false, false, t.level);
  } else {
    nameLine  = `${def.icon} ${def.name} <span style="color:#aaa">(Lv${t.level})</span>`;
    skillLine = def.desc;
  }
  return `<div style="font-weight:bold;color:#fff;font-size:0.75rem">${nameLine} <button class="detail-btn" onclick="toggleTowerDetail()">?</button></div>`
       + `<div style="color:#9ca3af;font-size:0.63rem;margin:2px 0">⚔ ${t.damage} dmg &nbsp;⚡ ${spd}/s &nbsp;📡 ${rng} tiles</div>`
       + `<div style="color:#d1d5db;font-size:0.62rem">${skillLine}</div>`;
}

function addParticle(x, y, text, color) {
  particles.push({
    x, y, text, color,
    vx:(Math.random()-.5)*22, vy:32+Math.random()*18,
    life:1.1, maxLife:1.1
  });
}

// ═══════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════
requestAnimationFrame(tick);

function tick(ts) {
  requestAnimationFrame(tick);
  const dt = Math.min((ts - lastTs)/1000, 0.1);
  lastTs = ts;
  if (state==='boss-warning') {
    bossWarnTimer -= dt;
    if (bossWarnTimer <= 0) { launchWave(); refreshUI(); }
  }
  if (state==='wave') update(dt);
  draw();
}

function update(dt) {
  // Spawn
  spawnTimer -= dt*1000;
  if (spawnTimer<=0 && spawnQueue.length>0) {
    spawnEnemy(spawnQueue.shift());
    spawnTimer = 1200;
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;

    if (e.vulnerable>0) e.vulnerable -= dt*1000;

    for (const d of e.dots) {
      d.duration -= dt*1000;
      d.timer    -= dt*1000;
      if (d.timer<=0) {
        const ad = dealDamage(e, d.damage);
        d.timer = d.interval;
        addParticle(e.x-5+Math.random()*10, e.y-13, `-${ad}`, d.color||'#c084fc');
      }
    }
    e.dots = e.dots.filter(d=>d.duration>0);

    if (e.hp<=0) {
      e.alive=false; money+=e.reward;
      playSound('death');
      addParticle(e.x, e.y-10, `+$${e.reward}`, '#fbbf24');
      refreshUI(); continue;
    }

    if (e.slow>0) e.slow -= dt*1000;
    const spd = e.slow>0 ? e.baseSpeed*e.slowMult : e.baseSpeed;

    const wp = currentWaypoints()[e.wpIdx+1];
    if (!wp) {
      e.alive = false;
      if (e.boss && isFinalBoss(wave)) {
        lives = 0; state = 'gameover';
      } else {
        lives -= e.boss ? 5 : 1;
        if (lives<=0){lives=0;state='gameover';}
      }
      refreshUI(); continue;
    }
    const dx=wp.x-e.x, dy=wp.y-e.y, dist=Math.hypot(dx,dy);
    if (dist<3) { e.wpIdx++; }
    else { const m=spd*dt; e.x+=dx/dist*m; e.y+=dy/dist*m; }
  }
  enemies = enemies.filter(e=>e.alive);

  // Towers shoot
  for (const t of towers) {
    t.lastShot += dt*1000;
    if (t.lastShot < t.fireRate) continue;

    const def  = DEFS[t.type];
    const vDef = t.variant ? VARIANTS[t.variant] : null;

    const hasLongkick = t.variant==='longkick' || (t.fusion && t.fusion.includes('longkick'));
    const lkChance    = (t.boosted && t.variant==='longkick')
      ? Math.min(0.5, VARIANTS.longkick.chance * 2)
      : VARIANTS.longkick.chance;
    const isLong      = hasLongkick && Math.random() < lkChance;
    let best=null, bestVal = isLong ? -Infinity : Infinity;
    for (const e of enemies) {
      const d=Math.hypot(e.x-t.x, e.y-t.y);
      if (d<=t.range && (isLong ? d>bestVal : d<bestVal)) { bestVal=d; best=e; }
    }
    if (!best) continue;
    t.lastShot = 0;
    playSound(t.type);

    if (t.type === 'poop') {
      const dist = Math.hypot(best.x-t.x, best.y-t.y);
      const flightTime = 0.8 + dist/(TILE*14);
      const BASE_RADIUS = TILE * 0.88;
      let projIcon, splatDur, splatDotDmg, splatRadius = BASE_RADIUS;
      if (t.fusion) {
        const fvs = t.fusion.map(vk => VARIANTS[vk]).filter(Boolean);
        projIcon    = fvs[0]?.projIcon ?? '💩';
        splatDur    = fvs.reduce((m, fv) => Math.max(m, fv.splatDuration||3), 3);
        const dMult = fvs.reduce((m, fv) => Math.max(m, fv.dotDmgMult||1), 1);
        splatDotDmg = fvs.length > 1
          ? Math.floor(t.damage * (1 + (dMult - 1) * 0.5))
          : Math.floor(t.damage * dMult);
      } else {
        const pv = t.variant ? VARIANTS[t.variant] : null;
        projIcon    = pv?.projIcon  ?? '💩';
        splatDur    = pv?.splatDuration ?? 3.0;
        splatDotDmg = pv ? Math.floor(t.damage * pv.dotDmgMult) : t.damage;
        if (t.boosted && t.variant === 'constipation') splatRadius = BASE_RADIUS * 2;
        if (t.level >= 5 && t.variant === 'constipation') splatRadius = BASE_RADIUS * (t.boosted ? 3 : 2.5);
      }
      if (t.level >= 5) {
        splatDotDmg = Math.floor(splatDotDmg * (t.boosted ? 1.6 : 1.35));
        if (!t.variant) splatRadius *= (t.boosted ? 1.5 : 1.25);
      }
      projectiles.push({
        id:pId++, done:false, arc:true,
        x:t.x, y:t.y,
        x1:t.x, y1:t.y, x2:best.x, y2:best.y,
        tx:best.x, ty:best.y,
        progress:0, duration:flightTime,
        arcHeight: Math.min(dist*0.55, TILE*5.5),
        dotDmg:t.damage, splatDuration:splatDur, splatDotDmg, splatRadius,
        type:'poop', icon:projIcon, variant:t.variant, fusion:t.fusion||null,
        boosted:t.boosted||false,
        speed:0, dot:false, special:false, glowColor:null, damage:0
      });
      continue;
    }

    const projDmg  = isLong ? Math.floor(t.damage*VARIANTS.longkick.farDmgMult) : t.damage;
    const projGlow = isLong ? '#38bdf8' : (vDef ? vDef.glowColor : (t.fusion ? VARIANTS[t.fusion[0]].glowColor : null));

    projectiles.push({
      id:pId++, done:false,
      x:t.x, y:t.y,
      targetId:best.id, tx:best.x, ty:best.y,
      damage:projDmg, speed:def.projSpeed,
      icon:isLong ? '🦵' : def.projIcon, type:t.type,
      variant:t.variant, fusion:t.fusion||null, special:isLong, glowColor:projGlow,
      boosted:t.boosted||false, level:t.level,
      dot:def.dot, dotDmg:t.damage,
      dotInterval:def.dotInterval, dotDuration:def.dotDuration
    });
  }

  // Poop splats — apply DoT to enemies in zone
  for (const s of poopSplats) {
    s.life -= dt;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (Math.hypot(e.x-s.x, e.y-s.y) <= s.radius && !e.dots.some(d=>d.poop)) {
        e.dots.push({damage:s.dotDmg, interval:400, duration:2500, timer:0, poop:true, color:'#92400e'});
        addParticle(e.x, e.y-18, '💩 POISONED', '#92400e');
      }
    }
  }
  poopSplats = poopSplats.filter(s=>s.life>0);

  // Move projectiles
  for (const p of projectiles) {
    if (p.done) continue;

    // Arc projectile (poop cannon)
    if (p.arc) {
      p.progress += dt / p.duration;
      if (p.progress >= 1) {
        p.progress = 1; p.done = true;
        poopSplats.push({ x:p.x2, y:p.y2, life:p.splatDuration, maxLife:p.splatDuration, radius:p.splatRadius, dotDmg:p.splatDotDmg, variant:p.variant, fusion:p.fusion });
        playSound('poop');
        addParticle(p.x2, p.y2-10, '💩 SPLAT!', '#92400e');
      }
      p.x = p.x1 + (p.x2-p.x1)*p.progress;
      p.y = (p.y1 + (p.y2-p.y1)*p.progress) - p.arcHeight*Math.sin(Math.PI*p.progress);
      continue;
    }

    const e = enemies.find(e=>e.id===p.targetId);
    if (e) { p.tx=e.x; p.ty=e.y; }
    const dx=p.tx-p.x, dy=p.ty-p.y, dist=Math.hypot(dx,dy);
    if (dist<7) {
      p.done = true;
      if (e && e.alive) {
        if (p.dot) {
          e.dots.push({damage:p.dotDmg, interval:p.dotInterval, duration:p.dotDuration, timer:0});
        } else {
          const ad = dealDamage(e, p.damage);
          addParticle(e.x, e.y-11, `-${ad}`, p.glowColor||DEFS[p.type].color);
        }
        // Variant / fusion effects
        if (p.fusion) {
          for (const vKey of p.fusion) applyVariantEffect(e, vKey, p, p.boosted || false, (p.level||2) >= 5, p.fusion.length > 1);
        } else if (p.variant) {
          applyVariantEffect(e, p.variant, p, p.boosted || false, (p.level||2) >= 5, false);
        }
        if (p.special) addParticle(e.x, e.y-22, '🦵 LONG KICK!', '#38bdf8');
      }
    } else {
      const m=p.speed*dt; p.x+=dx/dist*m; p.y+=dy/dist*m;
    }
  }
  projectiles = projectiles.filter(p=>!p.done);

  for (const p of particles) { p.life-=dt; p.y-=p.vy*dt; p.x+=p.vx*dt; }
  particles = particles.filter(p=>p.life>0);
  for (const c of chainEffects) c.life -= dt;
  chainEffects = chainEffects.filter(c=>c.life>0);

  // Wave complete
  if (spawnQueue.length===0 && enemies.length===0 && state==='wave') {
    if (isFinalBoss(wave)) {
      state = 'victory';
      money += 500;
      refreshUI();
      document.getElementById('info-txt').textContent =
        `🏆 FINAL BOSS DEFEATED! +$500 bonus. Press the button to enter Stage ${stage + 1}!`;
      hideAllUpgrades();
      document.getElementById('sell-btn').style.display='none';
    } else {
      state='idle';
      const bonus = 25+wave*5;
      money += bonus; refreshUI();
      document.getElementById('info-txt').textContent =
        `✅ Wave ${wave} cleared! +$${bonus} bonus. Build more, then send the next wave.`;
      hideAllUpgrades();
      document.getElementById('sell-btn').style.display='none';
    }
  }
}

// ═══════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════
function draw() {
  // Grass
  ctx.fillStyle='#3d6b34'; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#355e2d'; ctx.lineWidth=0.5;
  for (let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*TILE,0);ctx.lineTo(c*TILE,H);ctx.stroke();}
  for (let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*TILE);ctx.lineTo(W,r*TILE);ctx.stroke();}

  // Path
  for (const key of currentPathSet()) {
    const [c,r] = key.split(',').map(Number);
    ctx.fillStyle='#c2a46a';
    ctx.fillRect(c*TILE+1,r*TILE+1,TILE-2,TILE-2);
    ctx.fillStyle='#b0905a';
    [[4,4],[TILE-8,4],[4,TILE-8],[TILE-8,TILE-8]].forEach(([ox,oy])=>{
      ctx.fillRect(c*TILE+ox,r*TILE+oy,2,2);
    });
  }

  // Path arrows
  ctx.font=`${Math.floor(TILE*0.3)}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#8a6a30';
  const wpg = currentWpGrid();
  for (let i=0;i<wpg.length-1;i++) {
    const [c1,r1]=wpg[i],[c2,r2]=wpg[i+1];
    const mc=(c1+c2)/2, mr=(r1+r2)/2;
    ctx.fillText(c2>c1?'→':c2<c1?'←':r2>r1?'↓':'↑', mc*TILE+TILE/2, mr*TILE+TILE/2);
  }

  // START / END labels
  ctx.fillStyle='#fff'; ctx.font=`bold ${Math.floor(TILE*0.24)}px Segoe UI`;
  if (stage >= 2) {
    ctx.textAlign='left'; ctx.fillText('▶START', 2, 0*TILE+TILE*0.35);
    // center end marker
    ctx.font=`${Math.floor(TILE*0.55)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🎯', 4*TILE+TILE/2, 7*TILE+TILE/2);
    ctx.textBaseline='alphabetic';
  } else {
    ctx.textAlign='left';  ctx.fillText('▶START', 2, 1*TILE+TILE*0.35);
    ctx.textAlign='right'; ctx.fillText('END✕',  W-2, 13*TILE+TILE*0.65);
  }

  // Placement hover (touchmove preview)
  if (selType && touchCol>=0 && touchRow>=0) {
    const can = !currentPathSet().has(`${touchCol},${touchRow}`) &&
                !towers.some(t=>t.col===touchCol&&t.row===touchRow) &&
                touchCol<COLS && touchRow<ROWS;
    ctx.fillStyle = can ? 'rgba(255,255,255,0.25)' : 'rgba(255,60,60,0.3)';
    ctx.fillRect(touchCol*TILE, touchRow*TILE, TILE, TILE);
    ctx.beginPath();
    ctx.arc(touchCol*TILE+TILE/2, touchRow*TILE+TILE/2, DEFS[selType].range, 0, Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  // Selected tower range ring
  if (selTId!==null) {
    const t=towers.find(t=>t.id===selTId);
    if (t) {
      ctx.beginPath(); ctx.arc(t.x,t.y,t.range,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
    }
  }

  // Towers
  for (const t of towers) {
    const def = DEFS[t.type];
    const sel = t.id===selTId;
    if (sel) {
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.roundRect(t.col*TILE+1,t.row*TILE+1,TILE-2,TILE-2,5); ctx.fill();
    }
    ctx.fillStyle='#3a3a3a';
    ctx.beginPath(); ctx.roundRect(t.col*TILE+3,t.row*TILE+3,TILE-6,TILE-6,5); ctx.fill();
    const rx = t.col*TILE+5, ry = t.row*TILE+5, rw = TILE-10, rh = TILE-10;
    if (t.fusion) {
      const c1 = VARIANTS[t.fusion[0]].glowColor;
      const c2 = VARIANTS[t.fusion[t.fusion.length-1]].glowColor;
      if (c1 === c2) {
        ctx.fillStyle = c1;
        ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,4); ctx.fill();
      } else {
        ctx.save(); ctx.beginPath(); ctx.rect(rx,ry,rw/2,rh); ctx.clip();
        ctx.fillStyle = c1; ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,4); ctx.fill();
        ctx.restore();
        ctx.save(); ctx.beginPath(); ctx.rect(rx+rw/2,ry,rw/2,rh); ctx.clip();
        ctx.fillStyle = c2; ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,4); ctx.fill();
        ctx.restore();
      }
      ctx.save();
      if (t.level >= 5) {
        ctx.strokeStyle='rgba(255,80,0,0.9)'; ctx.lineWidth=2.5;
        ctx.shadowColor='#ff5000'; ctx.shadowBlur=14;
      } else if (t.level >= 4) {
        ctx.strokeStyle='rgba(255,215,0,0.9)'; ctx.lineWidth=2;
        ctx.shadowColor='#ffd700'; ctx.shadowBlur=10;
      } else {
        ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.5;
        ctx.shadowColor='#fff'; ctx.shadowBlur=6;
      }
      ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,4); ctx.stroke();
      ctx.restore();
    } else {
      ctx.fillStyle = t.variant ? VARIANTS[t.variant].glowColor : def.color;
      ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,4); ctx.fill();
      if (t.level >= 3 && t.boosted) {
        ctx.save();
        ctx.strokeStyle='rgba(196,181,253,0.7)'; ctx.lineWidth=1.5;
        ctx.shadowColor='#c4b5fd'; ctx.shadowBlur=5;
        ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,4); ctx.stroke();
        ctx.restore();
      }
    }
    ctx.font=`${Math.floor(TILE*0.48)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const tIcon = t.fusion ? (VARIANTS[t.fusion[0]].icon || def.icon)
                           : (t.variant && VARIANTS[t.variant].icon) ? VARIANTS[t.variant].icon : def.icon;
    ctx.fillText(tIcon, t.x, t.y);
    if (t.level > 1) {
      const isLv5 = t.level >= 5;
      const isLv4 = t.level >= 4;
      ctx.fillStyle = isLv5 ? '#ff6b35' : isLv4 ? '#ffd700' : t.fusion ? '#c4b5fd' : '#fbbf24';
      ctx.font = `${Math.floor(TILE*0.22)}px serif`;
      let indicator;
      if (isLv5) indicator = '💎';
      else if (isLv4) indicator = t.fusion ? '⚜' : '★★★';
      else if (t.fusion) indicator = '✦✦';
      else indicator = '★'.repeat(t.level - 1);
      ctx.fillText(indicator, t.x, t.row*TILE+TILE-Math.floor(TILE*0.15));
    }
  }

  // Poop splats (drawn under enemies)
  ctx.save();
  for (const s of poopSplats) {
    const a = s.life / s.maxLife;
    ctx.globalAlpha = a * 0.85;
    const hasDiarrhea = s.variant === 'diarrhea' || (s.fusion && s.fusion.includes('diarrhea'));
    const hasConstipation = s.variant === 'constipation' || (s.fusion && s.fusion.includes('constipation'));
    const sEmoji = hasDiarrhea ? '💦' : hasConstipation ? '🪨' : '💩';
    const sColor = hasDiarrhea ? '180,83,9' : hasConstipation ? '41,37,36' : '120,53,15';
    ctx.font = `${Math.floor(TILE*1.05)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(sEmoji, s.x, s.y);
    ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
    ctx.strokeStyle=`rgba(${sColor},${a*0.6})`; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle=`rgba(${sColor},${a*0.15})`; ctx.fill();
  }
  ctx.restore();

  // Enemies
  for (const e of enemies) {
    const hasPoopDot=e.dots.some(d=>d.poop), hasDot=e.dots.length>0, isSlowed=e.slow>0, isVuln=e.vulnerable>0;
    const r = e.boss ? TILE*0.46 : TILE*0.29;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(e.x, e.y+r*0.9, r*0.9, r*0.38, 0, 0, Math.PI*2); ctx.fill();
    // Boss pulse ring
    if (e.boss) {
      const p=0.5+0.5*Math.sin(Date.now()/200);
      ctx.beginPath(); ctx.arc(e.x,e.y,r+TILE*0.12,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,60,0,${0.5+0.4*p})`; ctx.lineWidth=3+p*2; ctx.stroke();
    }
    if (isVuln) {
      const p=0.5+0.5*Math.sin(Date.now()/120);
      ctx.beginPath(); ctx.arc(e.x,e.y,r+TILE*0.14,0,Math.PI*2);
      ctx.strokeStyle=`rgba(168,85,247,${0.45+0.45*p})`; ctx.lineWidth=3; ctx.stroke();
    }
    ctx.fillStyle = isVuln?'#fde047':isSlowed?'#38bdf8':hasPoopDot?'#92400e':hasDot?'#a855f7':e.boss?'#7f1d1d':'#ef4444';
    ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = isVuln?'#a855f7':isSlowed?'#0284c7':hasPoopDot?'#78350f':hasDot?'#7c3aed':e.boss?'#ff2200':'#991b1b';
    ctx.lineWidth = e.boss ? 3 : 2; ctx.stroke();
    ctx.font=`${Math.floor(e.boss ? TILE*0.58 : TILE*0.36)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(e.boss ? '👹' : '👾', e.x, e.y);
    const bw=e.boss?TILE*1.0:TILE*0.7, bh=e.boss?5:3, bx=e.x-bw/2, by=e.y-(r+TILE*0.22);
    ctx.fillStyle='#222'; ctx.fillRect(bx,by,bw,bh);
    const pct=e.hp/e.maxHp;
    ctx.fillStyle=pct>.6?'#22c55e':pct>.3?'#f59e0b':'#ef4444';
    ctx.fillRect(bx,by,bw*pct,bh);
  }

  // Projectiles
  for (const p of projectiles) {
    if (p.arc) {
      const spin = p.progress * Math.PI * 6;
      const scale = 0.5 + p.progress * (1 - p.progress) * 2;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(spin);
      ctx.font = `${Math.floor(TILE * 0.6 * Math.max(0.5, scale))}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.icon || '💩', 0, 0);
      ctx.restore();
      continue;
    }
    const angle=Math.atan2(p.ty-p.y, p.tx-p.x);
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(angle);
    if (p.glowColor) {
      ctx.beginPath(); ctx.arc(0,0,p.special?TILE*0.37:TILE*0.29,0,Math.PI*2);
      ctx.fillStyle=p.glowColor+'aa'; ctx.fill();
    }
    ctx.font=`${p.special?Math.floor(TILE*0.47):Math.floor(TILE*0.42)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.icon,0,0);
    if (p.variant==='lightning') {
      ctx.font=`${Math.floor(TILE*0.26)}px serif`; ctx.fillText('⚡',TILE*0.24,-TILE*0.24);
    }
    ctx.restore();
  }

  // Chain lightning bolts
  ctx.save();
  for (const c of chainEffects) {
    const alpha = c.life / c.maxLife;
    const segments = 8;
    const dx = (c.x2 - c.x1) / segments;
    const dy = (c.y2 - c.y1) / segments;
    const jitter = TILE * 0.28;
    ctx.beginPath();
    ctx.moveTo(c.x1, c.y1);
    for (let i = 1; i < segments; i++) {
      const px = c.x1 + dx * i + (Math.random() - 0.5) * jitter;
      const py = c.y1 + dy * i + (Math.random() - 0.5) * jitter;
      ctx.lineTo(px, py);
    }
    ctx.lineTo(c.x2, c.y2);
    ctx.strokeStyle = `rgba(253,224,71,${alpha})`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#fbbf24';
    ctx.shadowBlur = 10;
    ctx.stroke();
    // thin bright core
    ctx.beginPath();
    ctx.moveTo(c.x1, c.y1);
    for (let i = 1; i < segments; i++) {
      const px = c.x1 + dx * i + (Math.random() - 0.5) * jitter * 0.5;
      const py = c.y1 + dy * i + (Math.random() - 0.5) * jitter * 0.5;
      ctx.lineTo(px, py);
    }
    ctx.lineTo(c.x2, c.y2);
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.8})`;
    ctx.lineWidth = 1;
    ctx.shadowBlur = 0;
    ctx.stroke();
  }
  ctx.restore();

  // Particles
  ctx.save();
  for (const p of particles) {
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color; ctx.font=`bold ${Math.floor(TILE*0.3)}px Segoe UI`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.text,p.x,p.y);
  }
  ctx.restore();

  // Boss warning overlay
  if (state==='boss-warning') {
    const isFinal = isFinalBoss(wave);
    const pulse = 0.55 + 0.2 * Math.sin(Date.now() / 180);
    ctx.fillStyle = isFinal ? `rgba(60,0,60,${0.65 * pulse})` : `rgba(80,0,0,${0.55 * pulse})`;
    ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if (isFinal) {
      ctx.font=`bold ${Math.floor(TILE*0.8)}px Segoe UI`;
      ctx.fillStyle=`rgba(255,80,255,${pulse})`;
      ctx.fillText('☠️ FINAL BOSS ☠️', W/2, H/2 - TILE*1.1);
      ctx.font=`bold ${Math.floor(TILE*0.42)}px Segoe UI`;
      ctx.fillStyle='#ff6b35';
      ctx.fillText('Wave 30 — Last Stand!', W/2, H/2 - TILE*0.1);
      ctx.font=`${Math.floor(TILE*0.34)}px Segoe UI`;
      ctx.fillStyle='#fbbf24';
      ctx.fillText('Defeat it or the game ends!', W/2, H/2 + TILE*0.7);
    } else {
      ctx.font=`bold ${Math.floor(TILE*0.85)}px Segoe UI`;
      ctx.fillStyle=`rgba(255,60,60,${pulse})`;
      ctx.fillText('💀 BOSS WAVE', W/2, H/2 - TILE*0.9);
      ctx.font=`bold ${Math.floor(TILE*0.42)}px Segoe UI`;
      ctx.fillStyle='#fbbf24';
      ctx.fillText(`Wave ${wave} — Prepare yourself!`, W/2, H/2);
    }
    ctx.font=`${Math.floor(TILE*0.35)}px Segoe UI`;
    ctx.fillStyle='#ddd';
    ctx.fillText(`Starting in ${Math.ceil(bossWarnTimer)}…`, W/2, H/2 + TILE*(isFinal ? 1.45 : 0.85));
    ctx.restore();
  }

  // Overlays
  if (state==='idle' && wave===0 && stage===1) {
    ctx.fillStyle='rgba(0,0,0,0.52)'; ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.floor(TILE*0.65)}px Segoe UI`;
    ctx.fillText('Bodily TD', W/2, H/2-TILE*1.6);
    ctx.font=`bold ${Math.floor(TILE*0.42)}px Segoe UI`;
    ctx.fillStyle='#fbbf24';
    ctx.fillText('⚔ Stage 1 — 30 Waves ⚔', W/2, H/2-TILE*0.85);
    ctx.font=`${Math.floor(TILE*0.32)}px Segoe UI`; ctx.fillStyle='#aaa';
    ctx.fillText('Snake path • Survive all 30 waves', W/2, H/2-TILE*0.1);
    ctx.fillText('Beat wave 30 Boss to unlock Stage 2!', W/2, H/2+TILE*0.55);
    ctx.font=`${Math.floor(TILE*0.35)}px Segoe UI`; ctx.fillStyle='#ddd';
    ctx.fillText('Tap a tile to build — then ▶ Wave 1', W/2, H/2+TILE*1.35);
    ctx.restore();
  }

  if (state==='victory') {
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 300);
    ctx.fillStyle=`rgba(0,20,0,${0.72 * pulse})`; ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${Math.floor(TILE*0.9)}px Segoe UI`;
    ctx.fillStyle=`rgba(255,215,0,${pulse})`;
    ctx.fillText('🏆 CONGRATULATIONS! 🏆', W/2, H/2 - TILE*1.3);
    ctx.font=`bold ${Math.floor(TILE*0.5)}px Segoe UI`;
    ctx.fillStyle='#22c55e';
    ctx.fillText('Final Boss Defeated!', W/2, H/2 - TILE*0.35);
    ctx.font=`${Math.floor(TILE*0.38)}px Segoe UI`;
    ctx.fillStyle='#fbbf24';
    ctx.fillText(`Stage ${stage} Complete!`, W/2, H/2 + TILE*0.45);
    ctx.font=`${Math.floor(TILE*0.33)}px Segoe UI`;
    ctx.fillStyle='#93c5fd';
    ctx.fillText(`Press "Stage ${stage+1}" button to continue`, W/2, H/2 + TILE*1.2);
    ctx.restore();
  }

  if (state==='gameover') {
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ef4444';
    ctx.font=`bold ${Math.floor(TILE*1.1)}px Segoe UI`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('GAME OVER', W/2, H/2-TILE*0.8);
    ctx.fillStyle='#eee';
    ctx.font=`${Math.floor(TILE*0.52)}px Segoe UI`;
    ctx.fillText(`Survived ${wave} wave${wave!==1?'s':''}`, W/2, H/2+TILE*0.5);
    ctx.fillStyle='#aaa';
    ctx.font=`${Math.floor(TILE*0.35)}px Segoe UI`;
    ctx.fillText('Refresh to play again', W/2, H/2+TILE*1.3);
  }
}

// ═══════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════
function getCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const sx = W/rect.width, sy = H/rect.height;
  return {
    col: Math.floor((clientX-rect.left)*sx/TILE),
    row: Math.floor((clientY-rect.top)*sy/TILE)
  };
}

function handleTap(col, row) {
  if (state==='gameover') return;
  if (suppressNextTap) return;

  const existing = towers.find(t=>t.col===col&&t.row===row);
  if (existing) {
    if (selTId === existing.id) {
      // Same tower tapped again — deselect
      selTId = null;
      hideBuildPopup();
      clearInfo();
    } else {
      hideBuildPopup();
      selType = null;
      selTId  = existing.id;
      showTowerInfo(existing);
    }
  } else if (!currentPathSet().has(`${col},${row}`) && col>=0 && col<COLS && row>=0 && row<ROWS) {
    if (buildPopupCol === col && buildPopupRow === row) {
      // Same empty tile tapped again — close build popup
      hideBuildPopup();
      clearInfo();
    } else {
      selTId = null;
      hidePopup();
      clearInfo();
      showBuildPopup(col, row);
    }
  } else {
    hideBuildPopup();
    selType = null;
    selTId  = null;
    clearInfo();
  }
  refreshUI();
}

// Mouse (desktop preview)
canvas.addEventListener('mousemove', e => {
  const {col,row}=getCoords(e.clientX,e.clientY);
  touchCol=col; touchRow=row;
});
canvas.addEventListener('mouseleave',()=>{touchCol=-1;touchRow=-1;});
canvas.addEventListener('click', e => {
  const {col,row}=getCoords(e.clientX,e.clientY); handleTap(col,row);
});

// Touch
let tapStartX, tapStartY;
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.touches[0];
  tapStartX=t.clientX; tapStartY=t.clientY;
  const {col,row}=getCoords(t.clientX,t.clientY);
  touchCol=col; touchRow=row;
},{passive:false});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const t=e.touches[0];
  const {col,row}=getCoords(t.clientX,t.clientY);
  touchCol=col; touchRow=row;
},{passive:false});

canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  // Only count as tap if finger didn't move much
  if (Math.hypot(t.clientX-tapStartX, t.clientY-tapStartY) < 12) {
    const {col,row}=getCoords(t.clientX,t.clientY);
    handleTap(col,row);
  }
  touchCol=-1; touchRow=-1;
},{passive:false});

refreshUI();
</script>
