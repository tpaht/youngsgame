<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Tower Defense</title>
  <meta property="og:title" content="Tower Defense"/>
  <meta property="og:description" content="A mobile tower defense game. Place towers, survive waves!"/>
  <meta property="og:type" content="website"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background:#111;
      display:flex;
      flex-direction:column;
      align-items:center;
      font-family:'Segoe UI',sans-serif;
      color:#eee;
      min-height:100vh;
      overflow-x:hidden;
    }

    #wrapper {
      width:100%;
      max-width:440px;
      display:flex;
      flex-direction:column;
      position:relative;
    }

    /* ── Tower popup ── */
    #tower-popup {
      display:none;
      position:absolute;
      background:#1a1a2e;
      border:2px solid #4a4a7e;
      border-radius:10px;
      padding:8px 10px;
      z-index:20;
      pointer-events:auto;
      box-shadow:0 4px 16px rgba(0,0,0,0.7);
      min-width:160px;
    }
    #tower-popup::after {
      content:'';
      position:absolute;
      bottom:-10px; left:50%;
      transform:translateX(-50%);
      border:5px solid transparent;
      border-top-color:#4a4a7e;
    }
    #popup-title { font-size:0.72rem; color:#aaa; margin-bottom:6px; white-space:nowrap; }
    #popup-btns  { display:flex; gap:4px; flex-wrap:wrap; }
    #popup-btns button {
      padding:7px 10px; border-radius:6px; border:none;
      cursor:pointer; font-size:0.7rem; font-weight:bold;
      -webkit-tap-highlight-color:transparent;
    }
    #popup-btns button:disabled { background:#555 !important; cursor:not-allowed; opacity:0.6; }
    #pb-smelly    { background:#16a34a; color:#fff; }
    #pb-bloody    { background:#b91c1c; color:#fff; }
    #pb-lightning { background:#ca8a04; color:#fff; }
    #pb-longkick  { background:#0369a1; color:#fff; }
    #pb-phlegm    { background:#a16207; color:#fff; }
    #pb-herpes    { background:#7e22ce; color:#fff; }
    #pb-upgrade   { background:#2563eb; color:#fff; }
    #pb-sell      { background:#dc2626; color:#fff; }

    /* ── Stats bar ── */
    #stats-bar {
      background:#1a1a2e;
      padding:7px 12px;
      display:flex;
      justify-content:space-around;
      border-bottom:2px solid #2d2d4e;
      flex-shrink:0;
    }
    .stat { display:flex; flex-direction:column; align-items:center; }
    .stat .val { font-size:1.15rem; font-weight:bold; }
    .stat .lbl { font-size:0.62rem; color:#aaa; }

    /* ── Canvas ── */
    canvas {
      display:block;
      width:100%;
      touch-action:none;
    }

    /* ── Tower select + Wave ── */
    #tower-bar {
      background:#1a1a2e;
      padding:7px 8px;
      display:flex;
      align-items:stretch;
      gap:6px;
      border-top:2px solid #2d2d4e;
      flex-shrink:0;
    }
    .tbtn {
      flex:1;
      padding:8px 4px;
      border:2px solid #444;
      border-radius:8px;
      background:#222;
      color:#eee;
      cursor:pointer;
      font-size:0.68rem;
      text-align:center;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      transition:border-color .12s, background .12s;
    }
    .tbtn .ico { font-size:1.5rem; display:block; line-height:1.3; }
    .tbtn .cst { color:#fbbf24; }
    .tbtn.sel          { border-color:#fff; background:#2d2d4e; }
    .tbtn.unaffordable { opacity:.38; }

    #wave-btn {
      padding:8px 14px;
      background:#16a34a;
      border:none; border-radius:8px;
      color:#fff; font-size:0.9rem; font-weight:bold;
      cursor:pointer; white-space:nowrap; flex-shrink:0;
      -webkit-tap-highlight-color:transparent;
    }
    #wave-btn:disabled { background:#444; cursor:not-allowed; }

    /* ── Info / upgrade panel ── */
    #info-panel {
      background:#16163a;
      padding:8px 10px;
      border-top:1px solid #2d2d4e;
      min-height:52px;
      flex-shrink:0;
    }
    #info-txt {
      font-size:0.75rem; color:#ccc;
      display:block; margin-bottom:5px;
      line-height:1.3;
    }
    #upgrade-btns {
      display:flex; gap:5px; flex-wrap:wrap;
    }
    #upgrade-btns button {
      padding:8px 11px;
      border-radius:6px; border:none;
      cursor:pointer; font-size:0.72rem; font-weight:bold;
      -webkit-tap-highlight-color:transparent;
      line-height:1.1;
    }
    #up-smelly    { background:#16a34a; color:#fff; }
    #up-bloody    { background:#b91c1c; color:#fff; }
    #up-lightning { background:#ca8a04; color:#fff; }
    #up-longkick  { background:#0369a1; color:#fff; }
    #up-phlegm    { background:#a16207; color:#fff; }
    #up-herpes    { background:#7e22ce; color:#fff; }
    #up-btn       { background:#2563eb; color:#fff; }
    #sell-btn     { background:#dc2626; color:#fff; }
    #upgrade-btns button:disabled { background:#555 !important; cursor:not-allowed; }
  </style>
</head>
<body>
<div id="wrapper">

  <div id="stats-bar">
    <div class="stat"><span class="val" id="s-money">150</span><span class="lbl">💰 Gold</span></div>
    <div class="stat"><span class="val" id="s-lives">20</span><span class="lbl">❤️ Lives</span></div>
    <div class="stat"><span class="val" id="s-wave">0</span><span class="lbl">Wave</span></div>
  </div>

  <canvas id="c"></canvas>

  <div id="tower-bar">
    <div class="tbtn" id="btn-fist" onclick="selectType('fist')">
      <span class="ico">👊</span><span class="cst">$10</span>
    </div>
    <div class="tbtn" id="btn-kick" onclick="selectType('kick')">
      <span class="ico">🦵</span><span class="cst">$15</span>
    </div>
    <div class="tbtn" id="btn-spit" onclick="selectType('spit')">
      <span class="ico">💧</span><span class="cst">$20</span>
    </div>
    <button id="wave-btn" onclick="sendWave()">▶ Wave 1</button>
  </div>

  <div id="info-panel">
    <span id="info-txt">Tap a tower type, then tap a green tile to place it.</span>
    <div id="upgrade-btns">
      <button id="up-btn"       style="display:none" onclick="upgradeSelected()">Upgrade</button>
      <button id="up-smelly"    style="display:none" onclick="upgradeToVariant('smelly')">🟢 Smelly ($30)</button>
      <button id="up-bloody"    style="display:none" onclick="upgradeToVariant('bloody')">🔴 Bloody ($30)</button>
      <button id="up-lightning" style="display:none" onclick="upgradeToVariant('lightning')">⚡ Lightning ($40)</button>
      <button id="up-longkick"  style="display:none" onclick="upgradeToVariant('longkick')">💨 Long ($40)</button>
      <button id="up-phlegm"    style="display:none" onclick="upgradeToVariant('phlegm')">🟡 Phlegm ($50)</button>
      <button id="up-herpes"    style="display:none" onclick="upgradeToVariant('herpes')">🟣 Herpes ($50)</button>
      <button id="sell-btn"     style="display:none" onclick="sellSelected()">Sell</button>
    </div>
  </div>

  <div id="tower-popup">
    <div id="popup-title"></div>
    <div id="popup-btns"></div>
  </div>

</div>
<script>
// ═══════════════════════════════════════════════
//  CANVAS SETUP  (responsive tile size)
// ═══════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const COLS = 10, ROWS = 14;
const TILE = Math.floor(Math.min(window.innerWidth, 440) / COLS);
const W    = TILE * COLS;
const H    = TILE * ROWS;
canvas.width  = W;
canvas.height = H;

// ═══════════════════════════════════════════════
//  PATH  — portrait snake pattern (col, row)
// ═══════════════════════════════════════════════
const WP_GRID = [
  [0,1],[7,1],[7,4],[2,4],[2,7],[7,7],[7,10],[2,10],[2,13],[9,13]
];

const pathSet = new Set();
for (let i = 0; i < WP_GRID.length - 1; i++) {
  const [c1,r1] = WP_GRID[i], [c2,r2] = WP_GRID[i+1];
  if (r1 === r2)
    for (let c = Math.min(c1,c2); c <= Math.max(c1,c2); c++) pathSet.add(`${c},${r1}`);
  else
    for (let r = Math.min(r1,r2); r <= Math.max(r1,r2); r++) pathSet.add(`${c1},${r}`);
}

const WAYPOINTS = [
  { x: -TILE/2,  y: 1*TILE + TILE/2 },
  ...WP_GRID.map(([c,r]) => ({ x: c*TILE+TILE/2, y: r*TILE+TILE/2 })),
  { x: W+TILE/2, y: 13*TILE + TILE/2 }
];

// ═══════════════════════════════════════════════
//  TOWER DEFINITIONS  (ranges scaled to TILE)
// ═══════════════════════════════════════════════
const DEFS = {
  fist: {
    name:'Fist Tower', icon:'👊', cost:10,
    damage:12, range:TILE*1.8,  fireRate:800,
    color:'#f97316', projIcon:'👊', projSpeed:TILE*5.5,
    dot:false,
    desc:'Low dmg • Short range • Fast attack'
  },
  kick: {
    name:'Kick Tower', icon:'🦵', cost:15,
    damage:30, range:TILE*3.0,  fireRate:1800,
    color:'#3b82f6', projIcon:'🦵', projSpeed:TILE*7,
    dot:false,
    desc:'Medium dmg • Medium range • Slow attack'
  },
  spit: {
    name:'Spit Tower', icon:'💧', cost:20,
    damage:7,  range:TILE*4.0,  fireRate:2500,
    color:'#a855f7', projIcon:'💦', projSpeed:TILE*4,
    dot:true, dotInterval:500, dotDuration:3000,
    desc:'DoT dmg • Long range • Very slow attack'
  }
};

// ═══════════════════════════════════════════════
//  VARIANTS
// ═══════════════════════════════════════════════
const VARIANTS = {
  smelly: {
    name:'Smelly Fist', cost:30, forType:'fist', glowColor:'#22c55e',
    effect:'slow', slowDuration:1000, slowMult:0.35, chance:0.20,
    desc:'20% chance to slow enemy for 1s'
  },
  bloody: {
    name:'Bloody Fist', cost:30, forType:'fist', glowColor:'#ef4444',
    effect:'splash', splashRadius:TILE*1.7, splashRatio:0.5, chance:0.20,
    desc:'20% chance to splash damage nearby enemies'
  },
  lightning: {
    name:'Lightning Kick', cost:40, forType:'kick', glowColor:'#fbbf24',
    effect:'chain', chainCount:2, chainDmgRatio:0.65, chance:0.20,
    desc:'20% chance to chain lightning to 3 enemies'
  },
  longkick: {
    name:'Long Kick', cost:40, forType:'kick', glowColor:'#38bdf8',
    effect:'farthest', farDmgMult:1.5, chance:0.20, rangeMult:1.9,
    desc:'20% chance to target the farthest enemy'
  },
  phlegm: {
    name:'Phlegm Spit', cost:50, forType:'spit', glowColor:'#eab308',
    effect:'aoe_slow', slowRadius:TILE*1.8, slowDuration:2500, slowMult:0.35, chance:0.20,
    desc:'20% chance to AoE slow nearby enemies for 2.5s'
  },
  herpes: {
    name:'Herpes Spit', cost:50, forType:'spit', glowColor:'#a855f7',
    effect:'vulnerable', vulnDuration:4000, vulnMult:2, chance:0.20,
    desc:'20% chance: enemy takes 200% damage for 4s'
  }
};

// ═══════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resumeAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }
document.addEventListener('click', resumeAudio, { once: true });
document.addEventListener('touchstart', resumeAudio, { once: true });

function playSound(type) {
  try {
    const g = audioCtx.createGain();
    g.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'fist') {
      // Short punchy thud
      const o = audioCtx.createOscillator();
      o.connect(g);
      o.type = 'sine';
      o.frequency.setValueAtTime(120, now);
      o.frequency.exponentialRampToValueAtTime(40, now + 0.08);
      g.gain.setValueAtTime(0.55, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      o.start(now); o.stop(now + 0.1);
    } else if (type === 'kick') {
      // Deep kick thump
      const o = audioCtx.createOscillator();
      o.connect(g);
      o.type = 'sine';
      o.frequency.setValueAtTime(200, now);
      o.frequency.exponentialRampToValueAtTime(35, now + 0.18);
      g.gain.setValueAtTime(0.7, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      o.start(now); o.stop(now + 0.22);
    } else if (type === 'spit') {
      // Wet splat
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.12, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const f = audioCtx.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.value = 800; f.Q.value = 0.8;
      src.connect(f); f.connect(g);
      g.gain.setValueAtTime(0.35, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      src.start(now);
    } else if (type === 'death') {
      // Enemy death: descending squeal + noise burst
      const o = audioCtx.createOscillator();
      o.connect(g);
      o.type = 'square';
      o.frequency.setValueAtTime(520, now);
      o.frequency.exponentialRampToValueAtTime(80, now + 0.25);
      g.gain.setValueAtTime(0.28, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
      o.start(now); o.stop(now + 0.28);
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
let money=150, lives=20, wave=0;
let state='idle';

let towers=[], enemies=[], projectiles=[], particles=[], chainEffects=[];
let tId=0, eId=0, pId=0;
let spawnQueue=[], spawnTimer=0, lastTs=0;

let touchCol=-1, touchRow=-1;   // finger position for placement preview
let selType=null, selTId=null;

// ═══════════════════════════════════════════════
//  WAVE SYSTEM
// ═══════════════════════════════════════════════
function waveCfg(n) {
  return { count:6+n*2, hp:Math.floor(70*Math.pow(1.35,n)), speed:44+n*3, reward:2+Math.floor(n*0.6) };
}

function sendWave() {
  if (state!=='idle') return;
  wave++;
  state='wave';
  const cfg = waveCfg(wave);
  spawnQueue = Array.from({length:cfg.count}, ()=>({...cfg}));
  spawnTimer = 0;
  refreshUI();
}

function spawnEnemy(cfg) {
  enemies.push({
    id:eId++, alive:true,
    hp:cfg.hp, maxHp:cfg.hp,
    speed:cfg.speed, baseSpeed:cfg.speed, reward:cfg.reward,
    wpIdx:0,
    x:WAYPOINTS[0].x, y:WAYPOINTS[0].y,
    dots:[], slow:0, vulnerable:0
  });
}

// ═══════════════════════════════════════════════
//  DAMAGE HELPER
// ═══════════════════════════════════════════════
function dealDamage(e, dmg) {
  const actual = e.vulnerable > 0 ? Math.floor(dmg * VARIANTS.herpes.vulnMult) : dmg;
  e.hp -= actual;
  return actual;
}

// ═══════════════════════════════════════════════
//  TOWER ACTIONS
// ═══════════════════════════════════════════════
function placeTower(col, row) {
  if (!selType) return;
  const def = DEFS[selType];
  if (money < def.cost) return;
  if (col<0||col>=COLS||row<0||row>=ROWS) return;
  if (pathSet.has(`${col},${row}`)) return;
  if (towers.some(t=>t.col===col&&t.row===row)) return;
  money -= def.cost;
  towers.push({
    id:tId++, type:selType, col, row,
    x:col*TILE+TILE/2, y:row*TILE+TILE/2,
    level:1, variant:null,
    damage:def.damage, range:def.range, fireRate:def.fireRate, lastShot:0
  });
  refreshUI();
}

function upgradeSelected() {
  const t = towers.find(t=>t.id===selTId);
  if (!t||t.level>=3) return;
  const cost = Math.floor(DEFS[t.type].cost * 0.75);
  if (money < cost) return;
  money -= cost;
  t.level++;
  t.damage = Math.floor(DEFS[t.type].damage * (1+0.5*(t.level-1)));
  t.range  = Math.floor(DEFS[t.type].range  * (1+0.1*(t.level-1)));
  showTowerInfo(t); refreshUI();
}

function upgradeToVariant(key) {
  const t = towers.find(t=>t.id===selTId);
  if (!t||t.variant!==null) return;
  const v = VARIANTS[key];
  if (v.forType && t.type!==v.forType) return;
  if (money < v.cost) return;
  money -= v.cost;
  t.variant = key; t.level = 2;
  if (v.rangeMult) t.range = Math.floor(t.range * v.rangeMult);
  showTowerInfo(t); refreshUI();
}

function sellSelected() {
  const idx = towers.findIndex(t=>t.id===selTId);
  if (idx===-1) return;
  const t = towers[idx];
  money += Math.floor(DEFS[t.type].cost * 0.5 * t.level);
  towers.splice(idx,1);
  selTId = null; clearInfo(); refreshUI();
}

// ═══════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════
const ALL_UP_IDS = ['up-btn','up-smelly','up-bloody','up-lightning','up-longkick','up-phlegm','up-herpes'];

function refreshUI() {
  document.getElementById('s-money').textContent = money;
  document.getElementById('s-lives').textContent = lives;
  document.getElementById('s-wave').textContent  = wave;
  ['fist','kick','spit'].forEach(type => {
    const b = document.getElementById(`btn-${type}`);
    b.classList.toggle('sel', selType===type);
    b.classList.toggle('unaffordable', money<DEFS[type].cost && selType!==type);
  });
  const wb = document.getElementById('wave-btn');
  if (state==='wave')       { wb.textContent='⏳ In progress…'; wb.disabled=true; }
  else if (state==='gameover') { wb.textContent='Game Over'; wb.disabled=true; }
  else                      { wb.textContent=`▶ Wave ${wave+1}`; wb.disabled=false; }
}

function hideAllUpgrades() {
  ALL_UP_IDS.forEach(id => document.getElementById(id).style.display='none');
}

function showBtn(id, label, disabled) {
  const b = document.getElementById(id);
  b.style.display = 'inline-block';
  b.textContent   = label;
  b.disabled      = disabled;
}

function showTowerInfo(t) {
  const def  = DEFS[t.type];
  const sell = Math.floor(def.cost * 0.5 * t.level);
  const txt  = document.getElementById('info-txt');
  hideAllUpgrades();

  if (t.type==='fist' && t.variant===null) {
    txt.textContent = `👊 Fist | Lv1 | Dmg:${t.damage} | Choose upgrade:`;
    showBtn('up-smelly',   `🟢 Smelly ($${VARIANTS.smelly.cost})`,   money<VARIANTS.smelly.cost);
    showBtn('up-bloody',   `🔴 Bloody ($${VARIANTS.bloody.cost})`,   money<VARIANTS.bloody.cost);
  } else if (t.type==='kick' && t.variant===null) {
    txt.textContent = `🦵 Kick | Lv1 | Dmg:${t.damage} | Choose upgrade:`;
    showBtn('up-lightning',`⚡ Lightning ($${VARIANTS.lightning.cost})`, money<VARIANTS.lightning.cost);
    showBtn('up-longkick', `💨 Long Kick ($${VARIANTS.longkick.cost})`,  money<VARIANTS.longkick.cost);
  } else if (t.type==='spit' && t.variant===null) {
    txt.textContent = `💧 Spit | Lv1 | DoT:${t.damage}/tick | Choose upgrade:`;
    showBtn('up-phlegm', `🟡 Phlegm ($${VARIANTS.phlegm.cost})`, money<VARIANTS.phlegm.cost);
    showBtn('up-herpes', `🟣 Herpes ($${VARIANTS.herpes.cost})`, money<VARIANTS.herpes.cost);
  } else if (t.variant!==null) {
    const v = VARIANTS[t.variant];
    const icons = {smelly:'🟢',bloody:'🔴',lightning:'⚡',longkick:'💨',phlegm:'🟡',herpes:'🟣'};
    txt.textContent = `${icons[t.variant]} ${v.name} | Lv2 | ${v.desc}`;
  } else {
    const ucost = Math.floor(def.cost*0.75);
    txt.textContent = `${def.icon} ${def.name} | Lv${t.level}/3 | Dmg:${t.damage}`;
    if (t.level<3) showBtn('up-btn', `Upgrade ($${ucost})`, money<ucost);
  }
  showBtn('sell-btn', `Sell ($${sell})`, false);
  showPopup(t);
}

function clearInfo() {
  document.getElementById('info-txt').textContent = 'Tap a tower type, then tap a green tile to place it.';
  hideAllUpgrades();
  document.getElementById('sell-btn').style.display = 'none';
  hidePopup();
}

function hidePopup() {
  document.getElementById('tower-popup').style.display = 'none';
}

function showPopup(t) {
  const popup = document.getElementById('tower-popup');
  const title = document.getElementById('popup-title');
  const btns  = document.getElementById('popup-btns');
  const def   = DEFS[t.type];
  const sell  = Math.floor(def.cost * 0.5 * t.level);
  btns.innerHTML = '';

  const mkBtn = (id, label, color, disabled, fn) => {
    const b = document.createElement('button');
    b.id = id; b.textContent = label; b.disabled = disabled;
    b.style.background = disabled ? '' : color;
    b.style.color = '#fff';
    b.onclick = fn;
    btns.appendChild(b);
  };

  if (t.type==='fist' && t.variant===null) {
    title.textContent = `👊 Fist | Dmg:${t.damage}`;
    mkBtn('pb-smelly',   `🟢 Smelly ($${VARIANTS.smelly.cost})`,   '#16a34a', money<VARIANTS.smelly.cost,   ()=>{upgradeToVariant('smelly');  showPopup(towers.find(x=>x.id===t.id));});
    mkBtn('pb-bloody',   `🔴 Bloody ($${VARIANTS.bloody.cost})`,   '#b91c1c', money<VARIANTS.bloody.cost,   ()=>{upgradeToVariant('bloody');  showPopup(towers.find(x=>x.id===t.id));});
  } else if (t.type==='kick' && t.variant===null) {
    title.textContent = `🦵 Kick | Dmg:${t.damage}`;
    mkBtn('pb-lightning',`⚡ Lightning ($${VARIANTS.lightning.cost})`,'#ca8a04', money<VARIANTS.lightning.cost, ()=>{upgradeToVariant('lightning');showPopup(towers.find(x=>x.id===t.id));});
    mkBtn('pb-longkick', `💨 Long ($${VARIANTS.longkick.cost})`,    '#0369a1', money<VARIANTS.longkick.cost,  ()=>{upgradeToVariant('longkick'); showPopup(towers.find(x=>x.id===t.id));});
  } else if (t.type==='spit' && t.variant===null) {
    title.textContent = `💧 Spit | DoT:${t.damage}/tick`;
    mkBtn('pb-phlegm', `🟡 Phlegm ($${VARIANTS.phlegm.cost})`, '#a16207', money<VARIANTS.phlegm.cost, ()=>{upgradeToVariant('phlegm'); showPopup(towers.find(x=>x.id===t.id));});
    mkBtn('pb-herpes', `🟣 Herpes ($${VARIANTS.herpes.cost})`, '#7e22ce', money<VARIANTS.herpes.cost, ()=>{upgradeToVariant('herpes'); showPopup(towers.find(x=>x.id===t.id));});
  } else if (t.variant!==null) {
    const icons = {smelly:'🟢',bloody:'🔴',lightning:'⚡',longkick:'💨',phlegm:'🟡',herpes:'🟣'};
    title.textContent = `${icons[t.variant]} ${VARIANTS[t.variant].name} | Lv2`;
  } else {
    const ucost = Math.floor(def.cost*0.75);
    title.textContent = `${def.icon} ${def.name} | Lv${t.level}/3`;
    if (t.level<3) mkBtn('pb-upgrade', `Upgrade ($${ucost})`, '#2563eb', money<ucost, ()=>{upgradeSelected(); showPopup(towers.find(x=>x.id===t.id));});
  }
  mkBtn('pb-sell', `Sell ($${sell})`, '#dc2626', false, ()=>{ sellSelected(); });

  // Position above the tower tile
  const rect = canvas.getBoundingClientRect();
  const wRect = document.getElementById('wrapper').getBoundingClientRect();
  const scaleX = rect.width / W;
  const scaleY = rect.height / H;
  const tx = rect.left - wRect.left + t.x * scaleX;
  const ty = rect.top  - wRect.top  + t.y * scaleY;

  popup.style.display = 'block';
  const pw = popup.offsetWidth || 180;
  const ph = popup.offsetHeight || 80;
  let left = tx - pw / 2;
  let top  = ty - TILE * scaleY - ph - 6;
  // flip below if off top
  const statsH = document.getElementById('stats-bar').offsetHeight;
  if (top < statsH) top = ty + TILE * scaleY + 6;
  left = Math.max(4, Math.min(left, wRect.width - pw - 4));
  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';
}

function selectType(type) {
  if (state==='gameover') return;
  selType = selType===type ? null : type;
  selTId  = null;
  hidePopup();
  if (selType) {
    const def = DEFS[selType];
    document.getElementById('info-txt').textContent = `${def.icon} ${def.name} — $${def.cost} | ${def.desc}`;
    hideAllUpgrades();
    document.getElementById('sell-btn').style.display = 'none';
  } else { clearInfo(); }
  refreshUI();
}

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
function addParticle(x, y, text, color) {
  particles.push({
    x, y, text, color,
    vx:(Math.random()-.5)*22, vy:32+Math.random()*18,
    life:1.1, maxLife:1.1
  });
}

// ═══════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════
requestAnimationFrame(tick);

function tick(ts) {
  requestAnimationFrame(tick);
  const dt = Math.min((ts - lastTs)/1000, 0.1);
  lastTs = ts;
  if (state==='wave') update(dt);
  draw();
}

function update(dt) {
  // Spawn
  spawnTimer -= dt*1000;
  if (spawnTimer<=0 && spawnQueue.length>0) {
    spawnEnemy(spawnQueue.shift());
    spawnTimer = 1200;
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;

    if (e.vulnerable>0) e.vulnerable -= dt*1000;

    for (const d of e.dots) {
      d.duration -= dt*1000;
      d.timer    -= dt*1000;
      if (d.timer<=0) {
        const ad = dealDamage(e, d.damage);
        d.timer = d.interval;
        addParticle(e.x-5+Math.random()*10, e.y-13, `-${ad}`, '#c084fc');
      }
    }
    e.dots = e.dots.filter(d=>d.duration>0);

    if (e.hp<=0) {
      e.alive=false; money+=e.reward;
      playSound('death');
      addParticle(e.x, e.y-10, `+$${e.reward}`, '#fbbf24');
      refreshUI(); continue;
    }

    if (e.slow>0) e.slow -= dt*1000;
    const spd = e.slow>0 ? e.baseSpeed*VARIANTS.smelly.slowMult : e.baseSpeed;

    const wp = WAYPOINTS[e.wpIdx+1];
    if (!wp) {
      e.alive=false; lives--;
      if (lives<=0){lives=0;state='gameover';}
      refreshUI(); continue;
    }
    const dx=wp.x-e.x, dy=wp.y-e.y, dist=Math.hypot(dx,dy);
    if (dist<3) { e.wpIdx++; }
    else { const m=spd*dt; e.x+=dx/dist*m; e.y+=dy/dist*m; }
  }
  enemies = enemies.filter(e=>e.alive);

  // Towers shoot
  for (const t of towers) {
    t.lastShot += dt*1000;
    if (t.lastShot < t.fireRate) continue;

    const def  = DEFS[t.type];
    const vDef = t.variant ? VARIANTS[t.variant] : null;

    const isLong = t.variant==='longkick' && Math.random()<VARIANTS.longkick.chance;
    let best=null, bestVal = isLong ? -Infinity : Infinity;
    for (const e of enemies) {
      const d=Math.hypot(e.x-t.x, e.y-t.y);
      if (d<=t.range && (isLong ? d>bestVal : d<bestVal)) { bestVal=d; best=e; }
    }
    if (!best) continue;
    t.lastShot = 0;
    playSound(t.type);

    const projDmg  = isLong ? Math.floor(t.damage*VARIANTS.longkick.farDmgMult) : t.damage;
    const projGlow = isLong ? '#38bdf8' : (vDef ? vDef.glowColor : null);

    projectiles.push({
      id:pId++, done:false,
      x:t.x, y:t.y,
      targetId:best.id, tx:best.x, ty:best.y,
      damage:projDmg, speed:def.projSpeed,
      icon:def.projIcon, type:t.type,
      variant:t.variant, special:isLong, glowColor:projGlow,
      dot:def.dot, dotDmg:t.damage,
      dotInterval:def.dotInterval, dotDuration:def.dotDuration
    });
  }

  // Move projectiles
  for (const p of projectiles) {
    if (p.done) continue;
    const e = enemies.find(e=>e.id===p.targetId);
    if (e) { p.tx=e.x; p.ty=e.y; }
    const dx=p.tx-p.x, dy=p.ty-p.y, dist=Math.hypot(dx,dy);
    if (dist<7) {
      p.done = true;
      if (e && e.alive) {
        if (p.dot) {
          e.dots.push({damage:p.dotDmg, interval:p.dotInterval, duration:p.dotDuration, timer:0});
        } else {
          const ad = dealDamage(e, p.damage);
          addParticle(e.x, e.y-11, `-${ad}`, p.glowColor||DEFS[p.type].color);
        }
        // Variant effects
        if (p.variant && p.variant!=='longkick' && Math.random()<VARIANTS[p.variant].chance) {
          const v = VARIANTS[p.variant];
          if (v.effect==='slow') {
            e.slow = v.slowDuration;
            addParticle(e.x, e.y-22, '❄ SLOW!', '#67e8f9');
          } else if (v.effect==='splash') {
            const sd = Math.floor(p.damage*v.splashRatio);
            for (const ne of enemies) {
              if (ne.id!==e.id && ne.alive && Math.hypot(ne.x-e.x,ne.y-e.y)<=v.splashRadius) {
                const nd = dealDamage(ne, sd);
                addParticle(ne.x, ne.y-11, `-${nd}`, '#fca5a5');
              }
            }
            addParticle(e.x, e.y-22, '💥 SPLASH!', '#f87171');
          } else if (v.effect==='chain') {
            let from=e, cdmg=p.damage;
            const done=new Set([e.id]);
            for (let i=0;i<v.chainCount;i++) {
              cdmg = Math.floor(cdmg*v.chainDmgRatio);
              let next=null, minD=Infinity;
              for (const ne of enemies) {
                if (done.has(ne.id)||!ne.alive) continue;
                const d=Math.hypot(ne.x-from.x, ne.y-from.y);
                if (d<minD){minD=d;next=ne;}
              }
              if (!next) break;
              done.add(next.id);
              const cd = dealDamage(next, cdmg);
              addParticle(next.x, next.y-11, `⚡-${cd}`, '#fbbf24');
              chainEffects.push({ x1:from.x, y1:from.y, x2:next.x, y2:next.y, life:0.45, maxLife:0.45 });
              from = next;
            }
            addParticle(e.x, e.y-22, '⚡ CHAIN!', '#fbbf24');
          } else if (v.effect==='aoe_slow') {
            e.slow = v.slowDuration;
            for (const ne of enemies) {
              if (ne.id!==e.id && ne.alive && Math.hypot(ne.x-e.x,ne.y-e.y)<=v.slowRadius)
                ne.slow = v.slowDuration;
            }
            addParticle(e.x, e.y-22, '🟡 PHLEGM!', '#eab308');
          } else if (v.effect==='vulnerable') {
            e.vulnerable = v.vulnDuration;
            addParticle(e.x, e.y-22, '🦠 INFECTED!', '#a855f7');
          }
        }
        if (p.special) addParticle(e.x, e.y-22, '💨 LONG KICK!', '#38bdf8');
      }
    } else {
      const m=p.speed*dt; p.x+=dx/dist*m; p.y+=dy/dist*m;
    }
  }
  projectiles = projectiles.filter(p=>!p.done);

  for (const p of particles) { p.life-=dt; p.y-=p.vy*dt; p.x+=p.vx*dt; }
  particles = particles.filter(p=>p.life>0);
  for (const c of chainEffects) c.life -= dt;
  chainEffects = chainEffects.filter(c=>c.life>0);

  // Wave complete
  if (spawnQueue.length===0 && enemies.length===0 && state==='wave') {
    state='idle';
    const bonus = 25+wave*5;
    money += bonus; refreshUI();
    document.getElementById('info-txt').textContent =
      `✅ Wave ${wave} cleared! +$${bonus} bonus. Build more, then send the next wave.`;
    hideAllUpgrades();
    document.getElementById('sell-btn').style.display='none';
  }
}

// ═══════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════
function draw() {
  // Grass
  ctx.fillStyle='#3d6b34'; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#355e2d'; ctx.lineWidth=0.5;
  for (let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*TILE,0);ctx.lineTo(c*TILE,H);ctx.stroke();}
  for (let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*TILE);ctx.lineTo(W,r*TILE);ctx.stroke();}

  // Path
  for (const key of pathSet) {
    const [c,r] = key.split(',').map(Number);
    ctx.fillStyle='#c2a46a';
    ctx.fillRect(c*TILE+1,r*TILE+1,TILE-2,TILE-2);
    ctx.fillStyle='#b0905a';
    [[4,4],[TILE-8,4],[4,TILE-8],[TILE-8,TILE-8]].forEach(([ox,oy])=>{
      ctx.fillRect(c*TILE+ox,r*TILE+oy,2,2);
    });
  }

  // Path arrows
  ctx.font=`${Math.floor(TILE*0.3)}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#8a6a30';
  for (let i=0;i<WP_GRID.length-1;i++) {
    const [c1,r1]=WP_GRID[i],[c2,r2]=WP_GRID[i+1];
    const mc=(c1+c2)/2, mr=(r1+r2)/2;
    ctx.fillText(c2>c1?'→':c2<c1?'←':r2>r1?'↓':'↑', mc*TILE+TILE/2, mr*TILE+TILE/2);
  }

  // START / END
  ctx.fillStyle='#fff'; ctx.font=`bold ${Math.floor(TILE*0.24)}px Segoe UI`;
  ctx.textAlign='left';  ctx.fillText('▶START', 2, 1*TILE+TILE*0.35);
  ctx.textAlign='right'; ctx.fillText('END✕',  W-2, 13*TILE+TILE*0.65);

  // Placement hover (touchmove preview)
  if (selType && touchCol>=0 && touchRow>=0) {
    const can = !pathSet.has(`${touchCol},${touchRow}`) &&
                !towers.some(t=>t.col===touchCol&&t.row===touchRow) &&
                touchCol<COLS && touchRow<ROWS;
    ctx.fillStyle = can ? 'rgba(255,255,255,0.25)' : 'rgba(255,60,60,0.3)';
    ctx.fillRect(touchCol*TILE, touchRow*TILE, TILE, TILE);
    ctx.beginPath();
    ctx.arc(touchCol*TILE+TILE/2, touchRow*TILE+TILE/2, DEFS[selType].range, 0, Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  // Selected tower range ring
  if (selTId!==null) {
    const t=towers.find(t=>t.id===selTId);
    if (t) {
      ctx.beginPath(); ctx.arc(t.x,t.y,t.range,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
    }
  }

  // Towers
  for (const t of towers) {
    const def = DEFS[t.type];
    const sel = t.id===selTId;
    if (sel) {
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.roundRect(t.col*TILE+1,t.row*TILE+1,TILE-2,TILE-2,5); ctx.fill();
    }
    ctx.fillStyle='#3a3a3a';
    ctx.beginPath(); ctx.roundRect(t.col*TILE+3,t.row*TILE+3,TILE-6,TILE-6,5); ctx.fill();
    ctx.fillStyle = t.variant ? VARIANTS[t.variant].glowColor : def.color;
    ctx.beginPath(); ctx.roundRect(t.col*TILE+5,t.row*TILE+5,TILE-10,TILE-10,4); ctx.fill();
    ctx.font=`${Math.floor(TILE*0.48)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(def.icon, t.x, t.y);
    if (t.level>1) {
      ctx.fillStyle='#fbbf24'; ctx.font=`${Math.floor(TILE*0.22)}px serif`;
      ctx.fillText('★'.repeat(t.level-1), t.x, t.row*TILE+TILE-Math.floor(TILE*0.15));
    }
  }

  // Enemies
  for (const e of enemies) {
    const hasDot=e.dots.length>0, isSlowed=e.slow>0, isVuln=e.vulnerable>0;
    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(e.x,e.y+TILE*0.3,TILE*0.26,TILE*0.11,0,0,Math.PI*2); ctx.fill();
    if (isVuln) {
      const p=0.5+0.5*Math.sin(Date.now()/120);
      ctx.beginPath(); ctx.arc(e.x,e.y,TILE*0.4,0,Math.PI*2);
      ctx.strokeStyle=`rgba(168,85,247,${0.45+0.45*p})`; ctx.lineWidth=3; ctx.stroke();
    }
    ctx.fillStyle = isVuln?'#fde047':isSlowed?'#38bdf8':hasDot?'#a855f7':'#ef4444';
    ctx.beginPath(); ctx.arc(e.x,e.y,TILE*0.29,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = isVuln?'#a855f7':isSlowed?'#0284c7':hasDot?'#7c3aed':'#991b1b';
    ctx.lineWidth=2; ctx.stroke();
    ctx.font=`${Math.floor(TILE*0.36)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('👾',e.x,e.y);
    const bw=TILE*0.7, bh=3, bx=e.x-bw/2, by=e.y-TILE*0.52;
    ctx.fillStyle='#222'; ctx.fillRect(bx,by,bw,bh);
    const pct=e.hp/e.maxHp;
    ctx.fillStyle=pct>.6?'#22c55e':pct>.3?'#f59e0b':'#ef4444';
    ctx.fillRect(bx,by,bw*pct,bh);
  }

  // Projectiles
  for (const p of projectiles) {
    const angle=Math.atan2(p.ty-p.y, p.tx-p.x);
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(angle);
    if (p.glowColor) {
      ctx.beginPath(); ctx.arc(0,0,p.special?TILE*0.37:TILE*0.29,0,Math.PI*2);
      ctx.fillStyle=p.glowColor+'aa'; ctx.fill();
    }
    ctx.font=`${p.special?Math.floor(TILE*0.47):Math.floor(TILE*0.42)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.icon,0,0);
    if (p.variant==='lightning') {
      ctx.font=`${Math.floor(TILE*0.26)}px serif`; ctx.fillText('⚡',TILE*0.24,-TILE*0.24);
    } else if (p.special) {
      ctx.font=`${Math.floor(TILE*0.26)}px serif`; ctx.fillText('💨',TILE*0.24,-TILE*0.24);
    }
    ctx.restore();
  }

  // Chain lightning bolts
  ctx.save();
  for (const c of chainEffects) {
    const alpha = c.life / c.maxLife;
    const segments = 8;
    const dx = (c.x2 - c.x1) / segments;
    const dy = (c.y2 - c.y1) / segments;
    const jitter = TILE * 0.28;
    ctx.beginPath();
    ctx.moveTo(c.x1, c.y1);
    for (let i = 1; i < segments; i++) {
      const px = c.x1 + dx * i + (Math.random() - 0.5) * jitter;
      const py = c.y1 + dy * i + (Math.random() - 0.5) * jitter;
      ctx.lineTo(px, py);
    }
    ctx.lineTo(c.x2, c.y2);
    ctx.strokeStyle = `rgba(253,224,71,${alpha})`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#fbbf24';
    ctx.shadowBlur = 10;
    ctx.stroke();
    // thin bright core
    ctx.beginPath();
    ctx.moveTo(c.x1, c.y1);
    for (let i = 1; i < segments; i++) {
      const px = c.x1 + dx * i + (Math.random() - 0.5) * jitter * 0.5;
      const py = c.y1 + dy * i + (Math.random() - 0.5) * jitter * 0.5;
      ctx.lineTo(px, py);
    }
    ctx.lineTo(c.x2, c.y2);
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.8})`;
    ctx.lineWidth = 1;
    ctx.shadowBlur = 0;
    ctx.stroke();
  }
  ctx.restore();

  // Particles
  ctx.save();
  for (const p of particles) {
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color; ctx.font=`bold ${Math.floor(TILE*0.3)}px Segoe UI`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.text,p.x,p.y);
  }
  ctx.restore();

  // Overlays
  if (state==='idle' && wave===0) {
    ctx.fillStyle='rgba(0,0,0,0.52)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.floor(TILE*0.65)}px Segoe UI`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Tower Defense', W/2, H/2-TILE*1.2);
    ctx.font=`${Math.floor(TILE*0.37)}px Segoe UI`; ctx.fillStyle='#ddd';
    ctx.fillText('Tap a tower below, place on green tiles', W/2, H/2);
    ctx.fillText('then tap ▶ Wave 1 to start!', W/2, H/2+TILE*0.7);
  }

  if (state==='gameover') {
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ef4444';
    ctx.font=`bold ${Math.floor(TILE*1.1)}px Segoe UI`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('GAME OVER', W/2, H/2-TILE*0.8);
    ctx.fillStyle='#eee';
    ctx.font=`${Math.floor(TILE*0.52)}px Segoe UI`;
    ctx.fillText(`Survived ${wave} wave${wave!==1?'s':''}`, W/2, H/2+TILE*0.5);
    ctx.fillStyle='#aaa';
    ctx.font=`${Math.floor(TILE*0.35)}px Segoe UI`;
    ctx.fillText('Refresh to play again', W/2, H/2+TILE*1.3);
  }
}

// ═══════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════
function getCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const sx = W/rect.width, sy = H/rect.height;
  return {
    col: Math.floor((clientX-rect.left)*sx/TILE),
    row: Math.floor((clientY-rect.top)*sy/TILE)
  };
}

function handleTap(col, row) {
  if (state==='gameover') return;
  if (selType) {
    const existing = towers.find(t=>t.col===col&&t.row===row);
    if (existing) {
      selType = null;
      selTId  = existing.id;
      showTowerInfo(existing);
    } else {
      placeTower(col, row);
    }
  } else {
    const t = towers.find(t=>t.col===col&&t.row===row);
    if (t) { selTId=t.id; showTowerInfo(t); }
    else   { selTId=null; clearInfo(); }
  }
  refreshUI();
}

// Mouse (desktop preview)
canvas.addEventListener('mousemove', e => {
  const {col,row}=getCoords(e.clientX,e.clientY);
  touchCol=col; touchRow=row;
});
canvas.addEventListener('mouseleave',()=>{touchCol=-1;touchRow=-1;});
canvas.addEventListener('click', e => {
  const {col,row}=getCoords(e.clientX,e.clientY); handleTap(col,row);
});

// Touch
let tapStartX, tapStartY;
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.touches[0];
  tapStartX=t.clientX; tapStartY=t.clientY;
  const {col,row}=getCoords(t.clientX,t.clientY);
  touchCol=col; touchRow=row;
},{passive:false});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const t=e.touches[0];
  const {col,row}=getCoords(t.clientX,t.clientY);
  touchCol=col; touchRow=row;
},{passive:false});

canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  // Only count as tap if finger didn't move much
  if (Math.hypot(t.clientX-tapStartX, t.clientY-tapStartY) < 12) {
    const {col,row}=getCoords(t.clientX,t.clientY);
    handleTap(col,row);
  }
  touchCol=-1; touchRow=-1;
},{passive:false});

refreshUI();
</script>
</body>
</html>
