<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      letter-spacing: 4px;
      color: #0f3460;
      text-shadow: 0 0 10px #e94560;
    }

    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 12px;
      font-size: 1rem;
    }

    #scoreboard span { color: #e94560; font-weight: bold; font-size: 1.2rem; }

    canvas {
      border: 2px solid #e94560;
      box-shadow: 0 0 20px #e94560aa;
      border-radius: 4px;
    }

    #message {
      margin-top: 16px;
      font-size: 1rem;
      color: #aaa;
      height: 24px;
    }

    #message b { color: #e94560; }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="scoreboard">
    Score: <span id="score">0</span>
    &nbsp;&nbsp;Best: <span id="best">0</span>
  </div>
  <canvas id="c" width="400" height="400"></canvas>
  <div id="message">Press <b>Enter</b> or <b>Space</b> to start</div>

  <script>
    const canvas  = document.getElementById('c');
    const ctx     = canvas.getContext('2d');
    const GRID    = 20;
    const COLS    = canvas.width  / GRID;
    const ROWS    = canvas.height / GRID;

    let snake, dir, nextDir, food, score, best, running, animId;

    best = 0;

    function init() {
      snake   = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      running = true;
      placeFood();
      updateScore();
      if (animId) cancelAnimationFrame(animId);
      loop();
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    let lastTime = 0;
    const SPEED = 120; // ms per step

    function loop(ts = 0) {
      animId = requestAnimationFrame(loop);
      if (ts - lastTime < SPEED) return;
      lastTime = ts;
      if (running) update();
      draw();
    }

    function update() {
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        if (score > best) best = score;
        updateScore();
        placeFood();
      } else {
        snake.pop();
      }
    }

    function gameOver() {
      running = false;
      document.getElementById('message').innerHTML = 'Game Over! Press <b>Enter</b> or <b>Space</b> to restart';
    }

    function updateScore() {
      document.getElementById('score').textContent = score;
      document.getElementById('best').textContent  = best;
    }

    function draw() {
      // Background
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#ffffff08';
      for (let x = 0; x < COLS; x++)
        for (let y = 0; y < ROWS; y++)
          ctx.fillRect(x * GRID + GRID / 2 - 1, y * GRID + GRID / 2 - 1, 2, 2);

      // Food (pulsing)
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 200);
      ctx.shadowBlur = 10 + pulse * 10;
      ctx.shadowColor = '#ff6b6b';
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      ctx.arc(
        food.x * GRID + GRID / 2,
        food.y * GRID + GRID / 2,
        GRID / 2 - 2, 0, Math.PI * 2
      );
      ctx.fill();
      ctx.shadowBlur = 0;

      // Snake
      snake.forEach((seg, i) => {
        const ratio = 1 - i / snake.length;
        ctx.fillStyle = i === 0
          ? '#4ade80'
          : `hsl(145, 60%, ${25 + ratio * 30}%)`;
        ctx.shadowBlur = i === 0 ? 8 : 0;
        ctx.shadowColor = '#4ade80';
        const pad = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(
          seg.x * GRID + pad, seg.y * GRID + pad,
          GRID - pad * 2, GRID - pad * 2, 3
        );
        ctx.fill();
      });
      ctx.shadowBlur = 0;

      // Eyes on head
      const head = snake[0];
      ctx.fillStyle = '#000';
      const eyeOffsets = getEyeOffsets();
      eyeOffsets.forEach(([ex, ey]) => {
        ctx.beginPath();
        ctx.arc(
          head.x * GRID + ex, head.y * GRID + ey, 2, 0, Math.PI * 2
        );
        ctx.fill();
      });

      // Game-over overlay
      if (!running) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 36px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
        ctx.fillStyle = '#eee';
        ctx.font = '18px Segoe UI';
        ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 28);
        ctx.textAlign = 'left';
      }
    }

    function getEyeOffsets() {
      const c = GRID / 2;
      if (dir.x === 1)  return [[c + 4, c - 4], [c + 4, c + 4]];
      if (dir.x === -1) return [[c - 4, c - 4], [c - 4, c + 4]];
      if (dir.y === -1) return [[c - 4, c - 4], [c + 4, c - 4]];
      return                    [[c - 4, c + 4], [c + 4, c + 4]];
    }

    document.addEventListener('keydown', e => {
      const keys = {
        ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 },
        ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 },
        ArrowLeft:  { x: -1, y: 0 }, a: { x: -1, y: 0 },
        ArrowRight: { x: 1, y:  0 }, d: { x: 1,  y: 0 },
      };
      const d = keys[e.key];
      if (d && !(d.x === -dir.x && d.y === -dir.y)) nextDir = d;
      if ((e.key === 'Enter' || e.key === ' ') && !running) {
        document.getElementById('message').textContent = '';
        init();
      }
      if ([' ', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
    });

    // Draw idle screen
    draw();
  </script>
</body>
</html>
